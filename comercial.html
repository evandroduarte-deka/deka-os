<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEKA OS — Comercial WhatsApp</title>
  <style>
    /* ================================================================
       DEKA OS v2.0 — comercial.html
       Módulo: Comercial WhatsApp — Fila de Aprovação
       Tema: Escuro (uso prolongado em escritório)
       Regra: Zero lógica aqui — toda JS em comercial.js
    ================================================================ */

    /* ---- Reset ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    a { color: inherit; text-decoration: none; }

    /* ---- Design Tokens ---- */
    :root {
      /* Superfícies */
      --bg-base: #07090e;
      --bg-surface: #0c0f17;
      --bg-card: #10141f;
      --bg-card-hover: #151a28;

      /* Bordas */
      --border: #191f30;
      --border-active: #253050;

      /* Texto */
      --text-primary: #dde2f0;
      --text-secondary: #5a6480;
      --text-muted: #2e3650;

      /* Acento: Verde WhatsApp */
      --accent: #25d366;
      --accent-dim: rgba(37, 211, 102, 0.10);
      --accent-border: rgba(37, 211, 102, 0.22);

      /* Status */
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f5a623;
      --blue: #3b82f6;

      /* Tipografia */
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;

      /* Bordas */
      --r-md: 8px;
      --r-lg: 12px;
    }

    /* ---- Body ---- */
    body {
      font-family: var(--font-body);
      font-size: 14px;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ---- Header ---- */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 56px;
      background: rgba(7, 9, 14, 0.90);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }

    .logo {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .logo em {
      font-style: normal;
      color: var(--accent);
    }

    .header-nav {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    .nav-link {
      padding: 6px 12px;
      border-radius: var(--r-md);
      font-size: 13px;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .nav-link:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    /* ---- Main Grid ---- */
    .main-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 24px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ---- Seção ---- */
    .section {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
    }

    .btn-refresh {
      width: 32px;
      height: 32px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .btn-refresh:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ---- Lista de Mensagens ---- */
    .messages-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
    }

    .message-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .message-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-active);
    }

    .message-card.pendente {
      border-left: 3px solid var(--amber);
    }

    .message-card.aprovado {
      border-left: 3px solid var(--green);
    }

    .message-card.rejeitado {
      border-left: 3px solid var(--red);
      opacity: 0.6;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .contact-name {
      font-weight: 600;
      font-size: 13px;
    }

    .contact-number {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
    }

    .card-status {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-status.pendente {
      background: rgba(245, 166, 35, 0.15);
      color: var(--amber);
    }

    .card-status.aprovado {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
    }

    .card-status.rejeitado {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
    }

    .message-preview {
      font-size: 13px;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 6px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .card-estagio {
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
    }

    /* ---- Modal ---- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
    }

    .btn-close {
      width: 28px;
      height: 28px;
      border-radius: var(--r-md);
      display: grid;
      place-items: center;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .btn-close:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .modal-section {
      margin-bottom: 20px;
    }

    .modal-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .modal-value {
      font-size: 14px;
      color: var(--text-primary);
      padding: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      margin-bottom: 12px;
    }

    .modal-textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      resize: vertical;
    }

    .modal-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: var(--r-md);
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      background: #20b858;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-active);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--red);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    /* ---- Estados Vazios ---- */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-active);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }
  </style>
</head>
