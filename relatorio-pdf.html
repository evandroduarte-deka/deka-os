<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório Berti</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow Condensed', sans-serif;
      background: #FFFFFF;
      color: #1A1A1A;
      font-size: 14px;
      line-height: 1.5;
    }
    .pagina { max-width: 900px; margin: 0 auto; background: #FFFFFF; }

    /* BARRA AÇÕES */
    .barra-acoes {
      background: #1A1A1A; padding: 10px 32px;
      display: flex; gap: 10px; align-items: center;
    }
    .btn-imprimir {
      padding: 7px 18px; background: #C8A84B; color: #1A1A1A;
      border: none; font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer; border-radius: 3px;
    }
    .btn-imprimir:hover { background: #b8953e; }
    .btn-fechar {
      padding: 7px 14px; background: transparent; color: #FFFFFF;
      border: 1px solid #444; font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; cursor: pointer; border-radius: 3px;
    }
    .btn-fechar:hover { background: #333; }

    /* HEADER */
    .header {
      background: #1A1A1A; color: #FFFFFF;
      padding: 20px 32px;
      display: grid; grid-template-columns: auto 1fr auto;
      gap: 24px; align-items: center;
    }
    .logo-bloco { border-right: 1px solid #333; padding-right: 24px; min-width: 90px; }
    .logo-nome { font-size: 26px; font-weight: 800; letter-spacing: 3px; color: #FFFFFF; }
    .logo-sub { font-size: 9px; letter-spacing: 4px; color: #C8A84B; margin-top: 2px; text-transform: uppercase; }
    .header-titulo { font-size: 10px; color: #C8A84B; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
    .header-obra-nome { font-size: 18px; font-weight: 600; color: #FFFFFF; line-height: 1.2; }
    .header-obra-end { font-size: 11px; color: #888; margin-top: 4px; }
    .header-meta { text-align: right; font-size: 12px; color: #CCCCCC; line-height: 1.8; white-space: nowrap; }
    .header-meta strong { display: block; font-size: 15px; font-weight: 700; color: #FFFFFF; margin-bottom: 4px; }

    /* LINHA DOURADA */
    .linha-ouro { height: 2px; background: #C8A84B; width: 100%; }

    /* KPIs */
    .kpis { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid #E5E5E5; }
    .kpi { padding: 18px 24px; border-right: 1px solid #E5E5E5; }
    .kpi:last-child { border-right: none; }
    .kpi-label { font-size: 10px; font-weight: 700; color: #666; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .kpi-valor { font-size: 42px; font-weight: 700; color: #1A1A1A; line-height: 1; }
    .kpi-valor.ouro { color: #C8A84B; }
    .status-prazo { display: flex; align-items: center; gap: 6px; font-size: 18px; font-weight: 700; margin-top: 4px; }
    .status-prazo.ok      { color: #22C55E; }
    .status-prazo.atencao { color: #F59E0B; }
    .status-prazo.critico { color: #DC2626; }

    /* SEÇÕES */
    .secao { padding: 20px 32px; border-bottom: 1px solid #E5E5E5; }
    .secao-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .secao-num { font-size: 10px; font-weight: 700; color: #C8A84B; letter-spacing: 1px; }
    .secao-titulo { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #1A1A1A; }
    .secao-linha { flex: 1; height: 1px; background: #E5E5E5; }

    /* FOTOS */
    .fotos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .foto-wrap img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .foto-data { font-size: 11px; color: #999; margin-top: 4px; font-style: italic; }
    .foto-legenda { font-size: 11px; color: #555; margin-top: 2px; }

    /* TABELAS */
    .tabela { width: 100%; border-collapse: collapse; font-size: 12px; }
    .tabela thead tr { background: #1A1A1A; color: #FFFFFF; }
    .tabela thead th { padding: 9px 14px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .tabela tbody tr:nth-child(even) { background: #F5F5F5; }
    .tabela tbody tr:nth-child(odd)  { background: #FFFFFF; }
    .tabela tbody td { padding: 9px 14px; border-bottom: 1px solid #E5E5E5; vertical-align: middle; }

    /* BADGES */
    .badge { display: inline-block; padding: 3px 8px; border-radius: 3px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    .badge-concluido  { background: #DCFCE7; color: #166534; }
    .badge-andamento  { background: #DBEAFE; color: #1E3A5F; }
    .badge-executar   { background: #F3F4F6; color: #374151; }
    .badge-atrasado   { background: #FEE2E2; color: #991B1B; }

    /* PROGRESSO */
    .prog-wrap { display: flex; align-items: center; gap: 8px; }
    .prog-barra { width: 80px; height: 2px; background: #E5E5E5; border-radius: 1px; }
    .prog-fill { height: 100%; background: #1A1A1A; border-radius: 1px; }
    .prog-pct { font-size: 12px; font-weight: 600; }

    /* GANTT */
    .gantt-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .gantt-table th { background: #1A1A1A; color: #FFFFFF; padding: 7px 4px; text-align: center; font-size: 9px; font-weight: 700; }
    .gantt-table th.col-srv { text-align: left; padding-left: 14px; min-width: 180px; }
    .gantt-table th.col-pct { min-width: 40px; }
    .gantt-table tbody tr:nth-child(even) { background: #F5F5F5; }
    .gantt-table tbody tr:nth-child(odd)  { background: #FFFFFF; }
    .gantt-table tbody td { padding: 7px 4px; border-bottom: 1px solid #E5E5E5; text-align: center; }
    .gantt-table tbody td.col-srv { text-align: left; padding-left: 14px; }
    .gantt-pct { font-size: 11px; font-weight: 700; color: #C8A84B; }
    .gantt-cel { width: 24px; height: 18px; border-radius: 2px; margin: 0 auto; }
    .gantt-cel.ativo     { background: #86EFAC; }
    .gantt-cel.concluido { background: #16A34A; }
    .gantt-cel.andamento { background: #1E3A5F; }
    .gantt-cel.atrasado  { background: #DC2626; }
    .gantt-cel.hoje      { background: #1A1A1A; }
    .gantt-cel.vazio     { background: transparent; }

    /* RODAPÉ */
    .rodape { padding: 12px 32px; border-top: 1px solid #E5E5E5; display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: #999; }
    .rodape-empresa { color: #1A1A1A; font-weight: 700; }

    /* PRINT */
    @media print {
      .barra-acoes { display: none !important; }
      body { margin: 0; }
      @page { margin: 1.5cm; size: A4 portrait; }
    }
  </style>
</head>
<body>

  <div class="barra-acoes">
    <button class="btn-imprimir" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
    <button class="btn-fechar" onclick="window.close()">✕ Fechar</button>
  </div>

  <div class="pagina">

    <div class="header">
      <div class="logo-bloco">
        <div class="logo-nome">BERTI.</div>
        <div class="logo-sub">CONSTRUTORA</div>
      </div>
      <div>
        <div class="header-titulo" id="h-semana"></div>
        <div class="header-obra-nome" id="h-obra"></div>
        <div class="header-obra-end" id="h-end"></div>
      </div>
      <div class="header-meta">
        <strong id="h-cliente"></strong>
        <span id="h-periodo"></span><br>
        <span id="h-entrega"></span>
      </div>
    </div>

    <div class="linha-ouro"></div>

    <div class="kpis">
      <div class="kpi">
        <div class="kpi-label">Avanço Geral</div>
        <div class="kpi-valor ouro" id="k-avanco"></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Concluídos</div>
        <div class="kpi-valor" id="k-concluidos"></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Em Andamento</div>
        <div class="kpi-valor" id="k-andamento"></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Status do Prazo</div>
        <div id="k-prazo"></div>
      </div>
    </div>

    <div class="secao" id="sec-fotos" style="display:none">
      <div class="secao-header">
        <span class="secao-num">01</span>
        <span class="secao-titulo">Registro Fotográfico da Semana</span>
        <span class="secao-linha"></span>
      </div>
      <div class="fotos-grid" id="fotos-grid"></div>
    </div>

    <div class="secao" id="sec-servicos" style="display:none">
      <div class="secao-header">
        <span class="secao-num">02</span>
        <span class="secao-titulo">Serviços Executados</span>
        <span class="secao-linha"></span>
      </div>
      <table class="tabela">
        <thead>
          <tr>
            <th style="width:50%">Serviço</th>
            <th style="width:18%">Período</th>
            <th style="width:16%">Status</th>
            <th style="width:16%">Progresso</th>
          </tr>
        </thead>
        <tbody id="tbody-servicos"></tbody>
      </table>
    </div>

    <div class="secao" id="sec-plan" style="display:none">
      <div class="secao-header">
        <span class="secao-num">03</span>
        <span class="secao-titulo">Planejamento — Próxima Semana</span>
        <span class="secao-linha"></span>
      </div>
      <table class="tabela">
        <thead>
          <tr>
            <th style="width:60%">Serviço</th>
            <th style="width:22%">Período</th>
            <th style="width:18%">Status Atual</th>
          </tr>
        </thead>
        <tbody id="tbody-plan"></tbody>
      </table>
    </div>

    <div class="secao" id="sec-gantt" style="display:none">
      <div class="secao-header">
        <span class="secao-num">04</span>
        <span class="secao-titulo">Cronograma — Próximas 2 Semanas</span>
        <span class="secao-linha"></span>
      </div>
      <div id="gantt-container"></div>
    </div>

    <div class="rodape">
      <span class="rodape-empresa">Berti Construtora LTDA</span>
      <span id="rod-centro"></span>
      <span id="rod-pagina">Página 1</span>
    </div>

  </div>

  <script>
    // window.RELATORIO_DATA = { ... }   <- PLACEHOLDER NAO ALTERAR

    (function () {
      var d = window.RELATORIO_DATA;

      if (!d) {
        document.body.innerHTML =
          '<p style="padding:40px;font-family:sans-serif;color:#DC2626;font-size:16px">'
          + '⚠️ Erro: RELATORIO_DATA não carregado. Abrir este arquivo através do relatorios.js.</p>';
        return;
      }

      function esc(s) {
        return String(s || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function mostrar(id) {
        var el = document.getElementById(id);
        if (el) el.style.display = '';
      }

      function badge(status) {
        var map = {
          concluido:    ['badge-concluido', 'CONCLUÍDO'],
          em_andamento: ['badge-andamento', 'EM ANDAMENTO'],
          a_executar:   ['badge-executar',  'A EXECUTAR'],
          atrasado:     ['badge-atrasado',  'ATRASADO'],
        };
        var b = map[status] || ['badge-executar', esc(status)];
        return '<span class="badge ' + b[0] + '">' + b[1] + '</span>';
      }

      function prog(pct) {
        var v = Math.min(100, Math.max(0, parseInt(pct, 10) || 0));
        return '<div class="prog-wrap">'
          + '<div class="prog-barra"><div class="prog-fill" style="width:' + v + '%"></div></div>'
          + '<span class="prog-pct">' + v + '%</span>'
          + '</div>';
      }

      function prazoHTML(s) {
        var map = {
          ok:      ['ok',      '✅ No Prazo'],
          atencao: ['atencao', '⚠️ Atenção'],
          critico: ['critico', '🔴 Crítico'],
        };
        var v = map[s] || map.ok;
        return '<div class="status-prazo ' + v[0] + '">' + v[1] + '</div>';
      }

      var o = d.obra || {};

      document.getElementById('h-semana').textContent = 'RELATÓRIO DE OBRA — SEMANA ' + (d.semana || '');
      document.getElementById('h-obra').textContent   = o.nome     || '';
      document.getElementById('h-end').textContent    = o.endereco || '';
      document.getElementById('h-cliente').textContent = o.cliente || '';
      document.getElementById('h-periodo').textContent =
        'Período: ' + (d.periodoInicio || '') + ' a ' + (d.periodoFim || '');
      document.getElementById('h-entrega').textContent =
        'Entrega prevista: ' + (o.entregaPrevista || '—');

      document.getElementById('k-avanco').textContent     = (o.percentualGeral || 0) + '%';
      document.getElementById('k-concluidos').textContent = (d.kpis || {}).concluidos  || 0;
      document.getElementById('k-andamento').textContent  = (d.kpis || {}).emAndamento || 0;
      document.getElementById('k-prazo').innerHTML = prazoHTML(o.statusPrazo);

      var fotos = d.fotos || [];
      if (fotos.length > 0) {
        mostrar('sec-fotos');
        document.getElementById('fotos-grid').innerHTML = fotos.slice(0, 6).map(function (f) {
          var leg = f.legenda ? '<div class="foto-legenda">' + esc(f.legenda) + '</div>' : '';
          return '<div class="foto-wrap">'
            + '<img src="' + esc(f.url) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
            + '<div class="foto-data">' + esc(f.data) + '</div>' + leg + '</div>';
        }).join('');
      }

      var servicos = d.servicos || [];
      if (servicos.length > 0) {
        mostrar('sec-servicos');
        document.getElementById('tbody-servicos').innerHTML = servicos.map(function (s) {
          return '<tr><td>' + esc(s.descricao) + '</td>'
            + '<td>' + esc(s.periodo || '—') + '</td>'
            + '<td>' + badge(s.status) + '</td>'
            + '<td>' + prog(s.percentual) + '</td></tr>';
        }).join('');
      }

      var plan = d.planejamento || [];
      if (plan.length > 0) {
        mostrar('sec-plan');
        document.getElementById('tbody-plan').innerHTML = plan.map(function (p) {
          return '<tr><td>' + esc(p.descricao) + '</td>'
            + '<td>' + esc(p.periodo || '—') + '</td>'
            + '<td>' + badge(p.status) + '</td></tr>';
        }).join('');
      }

      var gantt = d.gantt;
      if (gantt && gantt.servicos && gantt.servicos.length > 0) {
        mostrar('sec-gantt');
        var inicio = new Date(gantt.periodoInicio + 'T12:00:00');
        var fim    = new Date(gantt.periodoFim    + 'T12:00:00');
        var hoje   = gantt.hoje || '';
        var dsem   = ['D', 'S', 'T', 'Q', 'Q', 'S', 'S'];
        var datas  = [];
        var cur    = new Date(inicio);
        while (cur <= fim) {
          datas.push(cur.toISOString().split('T')[0]);
          cur.setDate(cur.getDate() + 1);
        }
        var thDatas = datas.map(function (dt) {
          var d2  = new Date(dt + 'T12:00:00');
          var isH = dt === hoje ? ' style="background:#C8A84B"' : '';
          return '<th class="col-dia" style="min-width:28px"' + isH + '>'
            + d2.getDate() + '/' + String(d2.getMonth() + 1).padStart(2, '0')
            + '<br>' + dsem[d2.getDay()] + '</th>';
        }).join('');
        var thead = '<thead><tr><th class="col-srv">Serviço</th><th class="col-pct">%</th>' + thDatas + '</tr></thead>';
        var tbody = '<tbody>' + gantt.servicos.map(function (srv) {
          var cels = datas.map(function (dt) {
            var tipo = (srv.dias || {})[dt] || 'vazio';
            if (dt === hoje && tipo !== 'vazio') tipo = 'hoje';
            return '<td><div class="gantt-cel ' + tipo + '"></div></td>';
          }).join('');
          return '<tr><td class="col-srv">' + esc(srv.nome) + '</td>'
            + '<td class="col-pct"><span class="gantt-pct">' + (srv.percentual || 0) + '%</span></td>'
            + cels + '</tr>';
        }).join('') + '</tbody>';
        document.getElementById('gantt-container').innerHTML =
          '<table class="gantt-table">' + thead + tbody + '</table>';
      }

      document.getElementById('rod-centro').textContent =
        'Documento gerado em ' + (d.dataGeracao || '');
    })();
  </script>

</body>
</html>
