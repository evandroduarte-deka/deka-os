<!DOCTYPE html>
<html lang="pt-BR" data-tema="auto">
<!--
  DEKA OS v2.0 — oportunidades.html
  ════════════════════════════════════════════════════════════════════════════
  Tela: Funil Kanban de Oportunidades Comerciais

  IDs obrigatórios (contrato com oportunidades.js):
    #oportunidades-kanban      → container do kanban
    #oportunidades-contador    → contagem de oportunidades
    #oportunidades-valor-total → valor total do pipeline
    #btn-nova-oportunidade     → botão para abrir modal
    #modal-oportunidade        → modal de cadastro/edição

  REGRAS DEKA OS:
    - Zero lógica de negócio neste arquivo
    - Zero DOMContentLoaded aqui (exclusivo do deka.js)
    - window.DEKA_CONFIG definido antes de qualquer import
    - CSS embutido e escoped nesta tela
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DEKA OS — Funil de Oportunidades da Berti Construtora" />
  <title>Oportunidades · DEKA OS</title>

  <style>
    :root {
      --font-base: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  14px;
      --space-xs:   0.25rem;
      --space-sm:   0.5rem;
      --space-md:   1rem;
      --space-lg:   1.5rem;
      --space-xl:   2rem;
      --cor-acento:        #e2c55c;
      --cor-acento-suave:  rgba(226, 197, 92, 0.12);
      --cor-acento-hover:  #f0d878;
      --transicao-rapida:  120ms ease;
      --transicao-padrao:  200ms ease;
    }

    :root,
    [data-tema="escuro"] {
      --cor-fundo:          #0f1117;
      --cor-fundo-elevado:  #161b27;
      --cor-fundo-card:     #1c2333;
      --cor-fundo-hover:    #212a3e;
      --cor-borda:          rgba(255, 255, 255, 0.07);
      --cor-borda-hover:    rgba(226, 197, 92,  0.30);
      --cor-texto-primario: #e8eaf0;
      --cor-texto-secundario:#8892a4;
      --cor-texto-terciario: #5a6478;
    }

    [data-tema="claro"] {
      --cor-fundo:          #f5f5f0;
      --cor-fundo-elevado:  #ffffff;
      --cor-fundo-card:     #ffffff;
      --cor-fundo-hover:    #f8f8f6;
      --cor-borda:          rgba(0, 0, 0, 0.08);
      --cor-borda-hover:    rgba(226, 197, 92, 0.40);
      --cor-texto-primario: #1a1a1a;
      --cor-texto-secundario:#5a5a5a;
      --cor-texto-terciario: #888888;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-base);
      background: var(--cor-fundo);
      color: var(--cor-texto-primario);
      min-height: 100vh;
      padding: var(--space-lg);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
    }

    .topbar__voltar {
      padding: 0.5rem 1rem;
      background: var(--cor-fundo-elevado);
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-md);
      color: var(--cor-texto-secundario);
      text-decoration: none;
      transition: all var(--transicao-rapida);
    }

    .topbar__voltar:hover {
      background: var(--cor-fundo-hover);
      border-color: var(--cor-borda-hover);
    }

    .cabecalho {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
      gap: var(--space-md);
    }

    .cabecalho__esquerda {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    .titulo {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .info-linha {
      display: flex;
      gap: var(--space-md);
      font-size: 0.875rem;
      color: var(--cor-texto-secundario);
    }

    #oportunidades-contador,
    #oportunidades-valor-total {
      display: inline-flex;
      background: var(--cor-acento-suave);
      color: var(--cor-acento);
      font-weight: 600;
      padding: 0.2em 0.65em;
      border-radius: 999px;
      border: 1px solid rgba(226, 197, 92, 0.20);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transicao-rapida);
      background: var(--cor-fundo-elevado);
      color: var(--cor-texto-secundario);
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      background: var(--cor-fundo-hover);
      border-color: var(--cor-borda-hover);
    }

    .btn--primary {
      background: var(--cor-acento);
      color: #000;
      border-color: var(--cor-acento);
    }

    .btn--primary:hover:not(:disabled) {
      background: var(--cor-acento-hover);
    }

    .kanban {
      display: flex;
      gap: var(--space-md);
      overflow-x: auto;
      padding-bottom: var(--space-md);
    }

    .kanban-coluna {
      min-width: 280px;
      max-width: 280px;
      background: var(--cor-fundo-elevado);
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
    }

    .kanban-coluna__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-md);
      padding-bottom: var(--space-sm);
      border-bottom: 2px solid;
    }

    .kanban-coluna__titulo {
      font-size: 0.8125rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .kanban-coluna__contador {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2em 0.5em;
      border-radius: 999px;
      background: var(--cor-acento-suave);
      color: var(--cor-acento);
    }

    .kanban-coluna__cards {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      min-height: 100px;
    }

    .oportunidade-card {
      background: var(--cor-fundo-card);
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      cursor: pointer;
      transition: all var(--transicao-rapida);
    }

    .oportunidade-card:hover {
      background: var(--cor-fundo-hover);
      border-color: var(--cor-borda-hover);
      transform: translateY(-2px);
    }

    .card__nome {
      font-weight: 700;
      font-size: 0.9375rem;
      margin-bottom: var(--space-xs);
    }

    .card__descricao {
      font-size: 0.8125rem;
      color: var(--cor-texto-secundario);
      margin-bottom: var(--space-sm);
    }

    .card__valor {
      font-size: 1rem;
      font-weight: 600;
      color: var(--cor-acento);
      margin-bottom: var(--space-xs);
    }

    .card__info {
      font-size: 0.75rem;
      color: var(--cor-texto-terciario);
      margin-bottom: var(--space-xs);
    }

    .card__proximo-passo {
      font-size: 0.75rem;
      color: var(--cor-texto-secundario);
      font-style: italic;
      padding: var(--space-xs);
      background: var(--cor-fundo-elevado);
      border-radius: var(--radius-sm);
      margin-top: var(--space-xs);
    }

    .card__acoes {
      display: flex;
      gap: var(--space-xs);
      margin-top: var(--space-sm);
    }

    .btn-card {
      flex: 1;
      padding: 0.4rem 0.6rem;
      font-size: 0.75rem;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
    }

    .modal-overlay.ativo {
      display: flex;
    }

    .modal {
      background: var(--cor-fundo-card);
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-lg);
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: var(--space-xl);
    }

    .modal__titulo {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: var(--space-lg);
    }

    .form-grupo {
      margin-bottom: var(--space-md);
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--cor-texto-secundario);
      margin-bottom: var(--space-xs);
    }

    .form-label--obrigatorio::after {
      content: '*';
      color: #ef4444;
      margin-left: 0.2em;
    }

    .form-input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-md);
      background: var(--cor-fundo-elevado);
      color: var(--cor-texto-primario);
      font-size: 0.9375rem;
      transition: border-color var(--transicao-rapida);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--cor-borda-hover);
    }

    .form-radio-grupo {
      display: flex;
      gap: var(--space-md);
    }

    .form-radio-label {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      cursor: pointer;
      font-size: 0.9375rem;
    }

    .form-acoes {
      display: flex;
      gap: var(--space-sm);
      justify-content: flex-end;
      margin-top: var(--space-lg);
    }

    .estado-vazio {
      text-align: center;
      padding: var(--space-md);
      color: var(--cor-texto-terciario);
      font-size: 0.8125rem;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <a href="./hub.html" class="topbar__voltar">← Hub</a>
  </div>

  <div class="cabecalho">
    <div class="cabecalho__esquerda">
      <h1 class="titulo">
        <span>🎯</span>
        Oportunidades
      </h1>
      <div class="info-linha">
        <span id="oportunidades-contador">0 oportunidades</span>
        <span id="oportunidades-valor-total">R$ 0</span>
      </div>
    </div>
    <div class="cabecalho__direita">
      <button id="btn-nova-oportunidade" class="btn btn--primary">+ Nova Oportunidade</button>
    </div>
  </div>

  <div id="oportunidades-kanban" class="kanban">
    <!-- Colunas injetadas por oportunidades.js -->
  </div>

  <!-- Modal de Cadastro/Edição -->
  <div id="modal-oportunidade" class="modal-overlay">
    <div class="modal">
      <h2 class="modal__titulo" id="modal-titulo">Nova Oportunidade</h2>
      <form id="form-oportunidade">
        <input type="hidden" id="oportunidade-id" />

        <div class="form-grupo">
          <label class="form-label">Tipo de lead</label>
          <div class="form-radio-grupo">
            <label class="form-radio-label">
              <input type="radio" name="tipo-lead" value="cliente" checked />
              Cliente cadastrado
            </label>
            <label class="form-radio-label">
              <input type="radio" name="tipo-lead" value="lead" />
              Lead novo
            </label>
          </div>
        </div>

        <div id="campo-cliente" class="form-grupo">
          <label class="form-label form-label--obrigatorio">Cliente</label>
          <select id="oportunidade-cliente" class="form-input">
            <option value="">Selecione um cliente...</option>
          </select>
        </div>

        <div id="campo-lead-nome" class="form-grupo" style="display: none;">
          <label class="form-label form-label--obrigatorio">Nome do Lead</label>
          <input type="text" id="oportunidade-nome-lead" class="form-input" />
        </div>

        <div id="campo-lead-telefone" class="form-grupo" style="display: none;">
          <label class="form-label form-label--obrigatorio">Telefone do Lead</label>
          <input type="tel" id="oportunidade-telefone-lead" class="form-input" />
        </div>

        <div class="form-grupo">
          <label class="form-label">Valor estimado</label>
          <input type="number" id="oportunidade-valor" class="form-input" placeholder="R$" step="1000" />
        </div>

        <div class="form-grupo">
          <label class="form-label">Etapa</label>
          <select id="oportunidade-etapa" class="form-input">
            <option value="novo_lead">Novo Lead</option>
            <option value="qualificado">Qualificado</option>
            <option value="visita_agendada">Visita Agendada</option>
            <option value="proposta_enviada">Proposta Enviada</option>
            <option value="negociacao">Negociação</option>
            <option value="fechado_ganho">Fechado ✓</option>
            <option value="fechado_perdido">Perdido ✗</option>
          </select>
        </div>

        <div class="form-grupo">
          <label class="form-label">Origem</label>
          <select id="oportunidade-origem" class="form-input">
            <option value="">Selecione...</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="instagram">Instagram</option>
            <option value="indicacao">Indicação</option>
            <option value="site">Site</option>
            <option value="outro">Outro</option>
          </select>
        </div>

        <div class="form-grupo">
          <label class="form-label">Próximo passo</label>
          <input type="text" id="oportunidade-proximo-passo" class="form-input" />
          <button type="button" id="btn-sugerir-passo" class="btn" style="margin-top: 0.5rem;">✨ Sugerir com IA</button>
        </div>

        <div class="form-grupo">
          <label class="form-label">Observações</label>
          <textarea id="oportunidade-observacoes" class="form-input" rows="3"></textarea>
        </div>

        <div class="form-acoes">
          <button type="button" id="btn-cancelar" class="btn">Cancelar</button>
          <button type="submit" class="btn btn--primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">

    init();

  <script>
    (function iniciarTema() {
      const CHAVE_TEMA = 'deka_tema_preferencia';

      const temaAtual = localStorage.getItem(CHAVE_TEMA) || 'escuro';

  </script>

</body>
</html>
