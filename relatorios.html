<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios — DEKA OS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-base: #07090e;
      --bg-surface: #0f1419;
      --bg-elevated: #1a1f2e;
      --border: #2a2f3e;
      --text-primary: #e4e6eb;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --berti-green: #1A3A2A;
      --berti-gold: #9A7B3A;
      --berti-blue: #0D1F3C;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.6;
      padding: 2rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header */
    .page-header {
      margin-bottom: 3rem;
    }

    .page-header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    /* Section */
    .section {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
    }

    /* Obra Selection Grid */
    .obras-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .obra-card {
      background: var(--bg-elevated);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .obra-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .obra-card.selected {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.1);
    }

    .obra-card-nome {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .obra-card-cliente {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }

    .obra-card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
    }

    .obra-card-percentual {
      background: var(--berti-gold);
      color: var(--bg-base);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
    }

    .obra-card-status {
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.75rem;
    }

    /* Period Selection */
    .period-controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .form-group {
      flex: 1;
      min-width: 200px;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: border-color 0.2s ease;
    }

    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Button */
    .btn {
      padding: 0.75rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--bg-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--bg-base);
      border-color: var(--text-secondary);
    }

    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Progress Steps */
    .progress-steps {
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .progress-steps.visible {
      display: grid;
    }

    .step {
      text-align: center;
      padding: 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .step.active {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.1);
    }

    .step.completed {
      border-color: var(--success);
      background: rgba(16, 185, 129, 0.1);
    }

    .step-number {
      display: inline-block;
      width: 32px;
      height: 32px;
      line-height: 32px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text-secondary);
      font-weight: 700;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
    }

    .step.active .step-number {
      background: var(--accent);
      color: white;
    }

    .step.completed .step-number {
      background: var(--success);
      color: white;
    }

    .step.completed .step-number::before {
      content: '✓';
    }

    .step-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .step.active .step-label, .step.completed .step-label {
      color: var(--text-primary);
    }

    /* Preview Area */
    .preview-container {
      display: none;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .preview-container.visible {
      display: block;
    }

    .preview-content {
      max-width: 800px;
      margin: 0 auto;
      color: var(--text-primary);
    }

    .preview-content h1 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
      border-bottom: 2px solid var(--berti-gold);
      padding-bottom: 0.5rem;
    }

    .preview-content h2 {
      font-size: 1.25rem;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      color: var(--text-primary);
    }

    .preview-content p {
      margin-bottom: 1rem;
      color: var(--text-secondary);
    }

    .preview-content ul {
      margin-left: 1.5rem;
      margin-bottom: 1rem;
    }

    .preview-content li {
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }

    .preview-content strong {
      color: var(--berti-gold);
      font-weight: 600;
    }

    /* Action Buttons */
    .action-buttons {
      display: none;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .action-buttons.visible {
      display: flex;
    }

    /* Loading State */
    .loading-spinner {
      display: none;
      text-align: center;
      padding: 2rem;
    }

    .loading-spinner.visible {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 1rem;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty-state-text {
      font-size: 0.95rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .obras-grid {
        grid-template-columns: 1fr;
      }

      .period-controls {
        flex-direction: column;
      }

      .progress-steps {
        grid-template-columns: repeat(2, 1fr);
      }

      .action-buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="page-header">
      <h1>📊 Relatórios</h1>
      <p>Gere relatórios semanais personalizados para enviar aos clientes</p>
    </div>

    <!-- Obra Selection -->
    <div class="section">
      <h2 class="section-title">1. Selecione a obra</h2>
      <div id="obras-grid" class="obras-grid">
        <!-- Cards de obras serão inseridos aqui via JS -->
      </div>
      <div id="obras-loading" class="loading-spinner">
        <div class="spinner"></div>
        <div class="loading-text">Carregando obras...</div>
      </div>
      <div id="obras-empty" class="empty-state" style="display: none;">
        <div class="empty-state-icon">🏗️</div>
        <div class="empty-state-text">Nenhuma obra ativa encontrada</div>
      </div>
    </div>

    <!-- Period Selection -->
    <div class="section">
      <h2 class="section-title">2. Defina o período do relatório</h2>
      <div class="period-controls">
        <div class="form-group">
          <label class="form-label" for="data-inicio">Data de início</label>
          <input type="date" id="data-inicio" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="periodo-select">Período</label>
          <select id="periodo-select" class="form-select">
            <option value="7">7 dias (1 semana)</option>
            <option value="14" selected>14 dias (2 semanas)</option>
            <option value="30">30 dias (1 mês)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="data-fim">Data de término</label>
          <input type="date" id="data-fim" class="form-input" readonly>
        </div>
        <button id="btn-gerar" class="btn btn-primary" disabled>
          ▶️ Gerar Relatório
        </button>
      </div>
    </div>

    <!-- Progress Steps -->
    <div id="progress-steps" class="progress-steps">
      <div class="step" data-step="1">
        <div class="step-number">1</div>
        <div class="step-label">Buscando dados</div>
      </div>
      <div class="step" data-step="2">
        <div class="step-number">2</div>
        <div class="step-label">Processando IA</div>
      </div>
      <div class="step" data-step="3">
        <div class="step-number">3</div>
        <div class="step-label">Gerando preview</div>
      </div>
      <div class="step" data-step="4">
        <div class="step-number">4</div>
        <div class="step-label">Pronto!</div>
      </div>
    </div>

    <!-- Preview Area -->
    <div id="preview-container" class="preview-container">
      <div id="preview-content" class="preview-content">
        <!-- Conteúdo do relatório será inserido aqui via JS -->
      </div>
    </div>

    <!-- Action Buttons -->
    <div id="action-buttons" class="action-buttons">
      <button id="btn-exportar" class="btn btn-secondary">
        📄 Exportar HTML
      </button>
      <button id="btn-imprimir" class="btn btn-secondary">
        🖨️ Imprimir PDF
      </button>
      <button id="btn-copiar" class="btn btn-secondary">
        📋 Copiar Texto
      </button>
      <button id="btn-abrir-berti" class="btn btn-secondary" disabled>
        📄 Abrir Relatório Berti
      </button>
      <button id="btn-novo" class="btn btn-secondary">
        🔄 Novo Relatório
      </button>
    </div>
