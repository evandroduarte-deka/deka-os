<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEKA OS · Relatórios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Barlow Condensed', sans-serif; background: #F5F5F5; color: #1A1A1A; }

    /* BARRA NAV */
    .nav-bar { background: #1A3A2A; padding: 16px 24px; display: flex; align-items: center; gap: 20px; color: #fff; }
    .nav-voltar { color: #fff; text-decoration: none; font-size: 14px; font-weight: 700; transition: opacity 0.15s; }
    .nav-voltar:hover { opacity: 0.8; }
    .nav-titulo { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
    .nav-titulo-sep { color: #9A7B3A; }

    /* CONTAINER */
    .container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

    /* SEÇÃO */
    .secao { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 24px; }
    .secao-titulo { font-size: 14px; font-weight: 800; color: #1A3A2A; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #9A7B3A; }

    /* GRID DE OBRAS */
    .obras-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .obra-card { border: 1px solid #E5E5E5; border-radius: 6px; padding: 16px; background: #fff; cursor: pointer; transition: all 0.15s; }
    .obra-card:hover { border-color: #9A7B3A; }
    .obra-card.selected { border-color: #9A7B3A; background: #F5F5F5; }
    .obra-nome { font-size: 15px; font-weight: 700; color: #1A1A1A; margin-bottom: 4px; }
    .obra-cliente { font-size: 12px; color: #999; margin-bottom: 8px; }
    .obra-progresso { font-size: 22px; font-weight: 800; color: #9A7B3A; }

    /* CONFIGURAÇÃO */
    .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .config-grupo { }
    .config-label { font-size: 12px; font-weight: 700; color: #666; margin-bottom: 6px; display: block; }
    .config-select { width: 100%; padding: 10px 12px; border: 1px solid #E5E5E5; border-radius: 6px; font-size: 14px; font-family: 'Barlow Condensed', sans-serif; background: #fff; }
    .config-select:focus { outline: none; border-color: #1A3A2A; }
    .config-radios { display: flex; gap: 16px; }
    .config-radio { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .config-radio input { cursor: pointer; }
    .chip { display: inline-block; padding: 6px 14px; background: #1A3A2A; color: #fff; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }

    /* BOTÕES */
    .btn { padding: 12px 24px; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: all 0.15s; font-family: 'Barlow Condensed', sans-serif; }
    .btn-primario { background: #1A3A2A; color: #fff; }
    .btn-primario:hover { background: #142d20; }
    .btn-primario:disabled { background: #999; cursor: not-allowed; }
    .btn-sec { background: transparent; color: #1A3A2A; border: 1px solid #1A3A2A; }
    .btn-sec:hover { background: #1A3A2A; color: #fff; }
    .btn-grupo { display: flex; gap: 12px; margin-top: 16px; }

    /* PROGRESS STEPS */
    .steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .step { padding: 12px; background: #F5F5F5; border-radius: 6px; border-left: 3px solid #E5E5E5; }
    .step.ativo { border-color: #9A7B3A; background: #fffde7; }
    .step.concluido { border-color: #22C55E; background: #f0fdf4; }
    .step-num { font-size: 10px; font-weight: 700; color: #999; margin-bottom: 4px; }
    .step-label { font-size: 13px; font-weight: 700; color: #1A1A1A; }

    /* PREVIEW */
    .preview-header { background: #1A3A2A; color: #fff; padding: 20px 24px; border-radius: 8px 8px 0 0; margin-bottom: 0; }
    .preview-meta { font-size: 13px; line-height: 1.6; }
    .preview-content { background: #fff; padding: 24px; border: 1px solid #E5E5E5; border-top: none; border-radius: 0 0 8px 8px; }
    .preview-content h1 { font-size: 24px; font-weight: 800; color: #1A3A2A; margin-bottom: 12px; }
    .preview-content h2 { font-size: 18px; font-weight: 700; color: #1A3A2A; margin: 20px 0 12px; }
    .preview-content p { font-size: 14px; line-height: 1.7; margin-bottom: 12px; color: #333; }
    .preview-content ul { margin: 12px 0 12px 20px; }
    .preview-content li { font-size: 14px; line-height: 1.7; margin-bottom: 6px; }
    .preview-content strong { color: #9A7B3A; font-weight: 800; }
    .preview-vazio { text-align: center; padding: 60px 20px; color: #999; font-size: 14px; }
  </style>
</head>
<body>
  <!-- BARRA NAV -->
  <nav class="nav-bar">
    <a href="hub.html" class="nav-voltar">← Hub</a>
    <div class="nav-titulo">DEKA OS <span class="nav-titulo-sep">·</span> Relatórios</div>
  </nav>

  <div class="container">
    <!-- STEP 1: SELECIONAR OBRA -->
    <section class="secao">
      <div class="secao-titulo">1. Selecionar Obra</div>
      <div class="obras-grid" id="obras-grid">
        <p style="color:#999;font-size:13px">Carregando obras...</p>
      </div>
    </section>

    <!-- STEP 2: CONFIGURAR RELATÓRIO -->
    <section class="secao">
      <div class="secao-titulo">2. Configurar Relatório</div>
      <div style="margin-bottom:16px">
        <span class="chip" id="obra-selecionada-chip" style="display:none">—</span>
      </div>
      <div class="config-grid">
        <div class="config-grupo">
          <label class="config-label">Período</label>
          <select class="config-select" id="select-periodo">
            <option value="7">Últimos 7 dias</option>
            <option value="14">Últimos 14 dias</option>
            <option value="30">Últimos 30 dias</option>
          </select>
        </div>
        <div class="config-grupo">
          <label class="config-label">Tipo de Relatório</label>
          <div class="config-radios">
            <label class="config-radio">
              <input type="radio" name="tipo" value="semanal" checked>
              Relatório Semanal Cliente
            </label>
            <label class="config-radio">
              <input type="radio" name="tipo" value="gantt">
              Cronograma Gantt
            </label>
          </div>
        </div>
      </div>
      <button class="btn btn-primario" id="btn-gerar" disabled>★ GERAR RELATÓRIO</button>
    </section>

    <!-- PROGRESS STEPS -->
    <div class="steps" style="display:none" id="steps-container">
      <div class="step" id="step-1">
        <div class="step-num">STEP 1</div>
        <div class="step-label">Calcular período</div>
      </div>
      <div class="step" id="step-2">
        <div class="step-num">STEP 2</div>
        <div class="step-label">Buscar dados</div>
      </div>
      <div class="step" id="step-3">
        <div class="step-num">STEP 3</div>
        <div class="step-label">Gerar com IA</div>
      </div>
      <div class="step" id="step-4">
        <div class="step-num">STEP 4</div>
        <div class="step-label">Renderizar</div>
      </div>
    </div>

    <!-- STEP 3: PREVIEW -->
    <section class="secao" style="padding:0;display:none" id="preview-section">
      <div class="preview-header">
        <div class="preview-meta" id="preview-meta">—</div>
      </div>
      <div class="preview-content" id="preview-content">
        <div class="preview-vazio">Nenhum relatório gerado ainda.</div>
      </div>
      <div style="padding:24px">
        <div class="btn-grupo">
          <button class="btn btn-primario" id="btn-abrir-berti" disabled>📄 Abrir PDF</button>
          <button class="btn btn-sec" id="btn-imprimir" disabled>🖨️ Imprimir</button>
          <button class="btn btn-sec" id="btn-copiar" disabled>📋 Copiar texto</button>
          <button class="btn btn-sec" id="btn-exportar" disabled>💾 Exportar HTML</button>
          <button class="btn btn-sec" id="btn-novo" disabled>↺ Novo Relatório</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    import { init } from './relatorios.js';
    init();
  </script>
</body>
</html>
