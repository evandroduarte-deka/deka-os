<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEKA OS — Hub de Obras</title>
  <link rel="stylesheet" href="deka.css">
</head>
<body>

<div class="deka-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">DEKA</div>
      <div class="sb-logo-rule"></div>
      <div class="sb-logo-sub">BERTI CONSTRUTORA</div>
    </div>

    <div class="sb-nav">
      <div class="sb-section">Sistema</div>
      <button class="sb-item active" data-section="hub">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span>Hub de Obras</span>
      </button>
      <button class="sb-item" data-section="comercial" onclick="location.href='comercial.html'">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        <span>Comercial</span>
      </button>
      <button class="sb-item" data-section="brain" onclick="location.href='brain.html'">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        <span>Brain</span>
      </button>
    </div>

    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar">ED</div>
        <div>
          <div class="sb-user-name">Evandro Duarte</div>
          <div class="sb-user-role">Gestor</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="deka-main">
    <div class="topbar">
      <span class="topbar-title">Hub de Obras</span>
      <span class="topbar-sep"></span>
      <span class="topbar-sub">Visão geral de todas as obras ativas</span>
      <div class="topbar-spacer"></div>
      <button class="btn btn-gold btn-sm" id="btn-nova-obra">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Nova Obra
      </button>
    </div>

    <div class="content-pad">
      <!-- KPIs -->
      <div class="grid-4 mb-24">
        <div class="kpi-card c-azul">
          <div class="kpi-label">Obras Ativas</div>
          <div class="kpi-value" id="kpi-total">—</div>
        </div>
        <div class="kpi-card c-ok">
          <div class="kpi-label">No Prazo</div>
          <div class="kpi-value" id="kpi-no-prazo">—</div>
        </div>
        <div class="kpi-card c-at">
          <div class="kpi-label">Atenção</div>
          <div class="kpi-value" id="kpi-atencao">—</div>
        </div>
        <div class="kpi-card c-rk">
          <div class="kpi-label">Atrasadas</div>
          <div class="kpi-value" id="kpi-atrasadas">—</div>
        </div>
      </div>

      <!-- Grid de Obras -->
      <div class="section-divider mb-20">
        <span>Obras Ativas</span>
      </div>

      <div id="obras-grid" class="grid-3 gap-20">
        <!-- Cards serão inseridos aqui -->
      </div>

      <!-- Estado vazio -->
      <div id="empty-state" style="display:none; text-align:center; padding:80px 20px;">
        <svg width="80" height="80" fill="none" stroke="var(--c4)" viewBox="0 0 24 24" style="margin:0 auto 20px;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
        <p style="color:var(--c4); font-size:14px; margin-bottom:20px;">Nenhuma obra ativa no momento</p>
        <button class="btn btn-primary" onclick="abrirModalNovaObra()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Criar primeira obra
        </button>
      </div>
    </div>
  </main>

</div>

<script src="deka.js"></script>
<script>
'use strict'

let obrasCache = []

// ── INIT ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await carregarObras()
  document.getElementById('btn-nova-obra').addEventListener('click', abrirModalNovaObra)
})

// ── CARREGAR OBRAS ──────────────────────────────────────────
async function carregarObras() {
  try {
    const obras = await dbGet('obras', {
      'status': 'eq.ativa',
      'select': '*',
      'order': 'created_at.desc'
    })

    obrasCache = obras
    renderizarKPIs(obras)
    renderizarGrid(obras)
  } catch(e) {
    console.error('[index] carregarObras:', e)
    showToast('Erro ao carregar obras', 'rk')
  }
}

// ── RENDERIZAR KPIs ─────────────────────────────────────────
function renderizarKPIs(obras) {
  const total = obras.length
  let noPrazo = 0
  let atencao = 0
  let atrasadas = 0

  obras.forEach(obra => {
    const dias = diasRestantes(obra.periodo_fim)
    if (dias === null) {
      // Sem prazo definido
    } else if (dias < 0) {
      atrasadas++
    } else if (dias <= 7) {
      atencao++
    } else {
      noPrazo++
    }
  })

  document.getElementById('kpi-total').textContent = total
  document.getElementById('kpi-no-prazo').textContent = noPrazo
  document.getElementById('kpi-atencao').textContent = atencao
  document.getElementById('kpi-atrasadas').textContent = atrasadas
}

// ── RENDERIZAR GRID ─────────────────────────────────────────
function renderizarGrid(obras) {
  const grid = document.getElementById('obras-grid')
  const empty = document.getElementById('empty-state')

  if (!obras.length) {
    grid.style.display = 'none'
    empty.style.display = 'block'
    return
  }

  grid.style.display = 'grid'
  empty.style.display = 'none'

  grid.innerHTML = obras.map(obra => {
    const dias = diasRestantes(obra.periodo_fim)
    let statusClass = 'ok'
    let statusText = 'No prazo'
    let statusDot = 'ok'

    if (dias === null) {
      statusClass = 'muted'
      statusText = 'Sem prazo'
      statusDot = 'muted'
    } else if (dias < 0) {
      statusClass = 'rk'
      statusText = `Atrasada ${Math.abs(dias)}d`
      statusDot = 'rk'
    } else if (dias <= 7) {
      statusClass = 'at'
      statusText = `${dias}d restantes`
      statusDot = 'at'
    } else {
      statusText = `${dias}d restantes`
    }

    return `
      <div class="card" style="cursor:pointer; transition:transform .15s;"
           onmouseover="this.style.transform='translateY(-2px)'"
           onmouseout="this.style.transform='translateY(0)'"
           onclick="navegarParaObra('${obra.obra_key}')">
        <div class="card-header">
          <span class="card-title">${obra.obra_key}</span>
          <span class="badge badge-${statusDot === 'muted' ? 'muted' : statusDot}">
            <span class="badge-dot"></span>
            ${statusText}
          </span>
        </div>
        <div class="card-body">
          <h3 style="font-size:16px; font-weight:600; color:var(--bk); margin-bottom:8px; line-height:1.3;">
            ${obra.nome}
          </h3>
          <div style="display:flex; flex-direction:column; gap:6px;">
            ${obra.cliente ? `
            <div style="display:flex; align-items:center; gap:8px;">
              <svg width="14" height="14" fill="none" stroke="var(--c4)" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              <span style="font-size:12px; color:var(--c4);">${obra.cliente}</span>
            </div>
            ` : ''}
            ${obra.periodo_fim ? `
            <div style="display:flex; align-items:center; gap:8px;">
              <svg width="14" height="14" fill="none" stroke="var(--c4)" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              <span style="font-size:12px; color:var(--c4);">Entrega: ${formatDate(obra.periodo_fim)}</span>
            </div>
            ` : ''}
            ${obra.endereco ? `
            <div style="display:flex; align-items:center; gap:8px;">
              <svg width="14" height="14" fill="none" stroke="var(--c4)" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              <span style="font-size:11px; color:var(--c4); line-height:1.3;">${truncarTexto(obra.endereco, 50)}</span>
            </div>
            ` : ''}
          </div>
        </div>
        <div class="card-footer" style="display:flex; align-items:center; justify-content:space-between;">
          <span style="font-size:10px; color:var(--c4);">Criada em ${formatDate(obra.created_at)}</span>
          <svg width="16" height="16" fill="none" stroke="var(--d)" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
      </div>
    `
  }).join('')
}

// ── NAVEGAR PARA OBRA ───────────────────────────────────────
function navegarParaObra(obraKey) {
  location.href = `obra.html?obra=${obraKey}`
}

// ── MODAL NOVA OBRA ─────────────────────────────────────────
function abrirModalNovaObra() {
  const conteudo = `
    <form id="form-nova-obra" onsubmit="criarObra(event)">
      <div class="form-group">
        <label class="form-label">Nome da Obra *</label>
        <input type="text" class="form-input" name="nome" placeholder="Ex: Reforma Loja Shopping ABC" required>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Cliente</label>
          <input type="text" class="form-input" name="cliente" placeholder="Nome do cliente">
        </div>
        <div class="form-group">
          <label class="form-label">CNPJ do Cliente</label>
          <input type="text" class="form-input" name="cnpj_cliente" placeholder="00.000.000/0001-00">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Endereço</label>
        <input type="text" class="form-input" name="endereco" placeholder="Endereço completo da obra">
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Data de Início</label>
          <input type="date" class="form-input" name="periodo_ini">
        </div>
        <div class="form-group">
          <label class="form-label">Data de Término *</label>
          <input type="date" class="form-input" name="periodo_fim" required>
        </div>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">Valor Total (R$)</label>
          <input type="number" class="form-input" name="valor" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label">Taxa ADM (%)</label>
          <input type="number" class="form-input" name="taxa_adm" value="15" step="0.1" min="0" max="100">
          <div class="form-hint">Padrão: 15%</div>
        </div>
      </div>
    </form>
  `

  showModal({
    titulo: 'Nova Obra',
    conteudo,
    largura: 'wide',
    onConfirm: () => {
      const form = document.getElementById('form-nova-obra')
      form.dispatchEvent(new Event('submit'))
    }
  })
}

// ── CRIAR OBRA ──────────────────────────────────────────────
async function criarObra(e) {
  e.preventDefault()

  const form = e.target
  const formData = new FormData(form)
  const btn = document.getElementById('modal-confirm-btn')

  const nome = formData.get('nome').trim()
  if (!nome) {
    showToast('Nome da obra é obrigatório', 'at')
    return
  }

  const periodo_fim = formData.get('periodo_fim')
  if (!periodo_fim) {
    showToast('Data de término é obrigatória', 'at')
    return
  }

  const obra_key = slugify(nome)

  // Verificar se obra_key já existe
  const existente = await dbGet('obras', { 'obra_key': `eq.${obra_key}` })
  if (existente.length > 0) {
    showToast('Já existe uma obra com este nome', 'at')
    return
  }

  const data = {
    obra_key,
    nome,
    cliente: formData.get('cliente') || null,
    cnpj_cliente: formData.get('cnpj_cliente') || null,
    endereco: formData.get('endereco') || null,
    periodo_ini: formData.get('periodo_ini') || null,
    periodo_fim,
    valor: formData.get('valor') ? parseFloat(formData.get('valor')) : null,
    taxa_adm: formData.get('taxa_adm') ? parseFloat(formData.get('taxa_adm')) / 100 : 0.15,
    status: 'ativa'
  }

  setLoading(btn, true)

  try {
    const result = await dbPost('obras', data)

    if (!result) {
      setLoading(btn, false)
      return
    }

    showToast('Obra criada com sucesso', 'ok')
    closeModal()
    await carregarObras()
  } catch(e) {
    console.error('[index] criarObra:', e)
    showToast('Erro ao criar obra', 'rk')
    setLoading(btn, false)
  }
}

// ── UTILS ───────────────────────────────────────────────────
function truncarTexto(texto, max) {
  if (!texto) return ''
  return texto.length > max ? texto.substring(0, max) + '...' : texto
}

</script>

</body>
</html>
