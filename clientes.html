<!DOCTYPE html>
<html lang="pt-BR" data-tema="auto">
<!--
  DEKA OS v2.0 — clientes.html
  ════════════════════════════════════════════════════════════════════════════
  Tela: CRM de Clientes Cadastrados

  IDs obrigatórios (contrato com clientes.js):
    #clientes-tabela     → tbody da tabela de clientes
    #clientes-contador   → contagem de clientes no título
    #btn-novo-cliente    → botão para abrir modal de novo cliente
    #btn-refresh         → botão de atualização manual
    #input-busca         → campo de busca
    #modal-cliente       → modal de cadastro/edição
    #painel-cliente      → painel lateral de detalhe

  REGRAS DEKA OS:
    - Zero lógica de negócio neste arquivo
    - Zero DOMContentLoaded aqui (exclusivo do deka.js)
    - window.DEKA_CONFIG definido antes de qualquer import
    - CSS embutido e escoped nesta tela
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DEKA OS — CRM de Clientes da Berti Construtora" />
  <title>Clientes · DEKA OS</title>

  <style>
    :root {
      --font-base: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-mono: "SF Mono", "Fira Code", "Consolas", monospace;
      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  14px;
      --space-xs:   0.25rem;
      --space-sm:   0.5rem;
      --space-md:   1rem;
      --space-lg:   1.5rem;
      --space-xl:   2rem;
      --cor-acento:        #e2c55c;
      --cor-acento-suave:  rgba(226, 197, 92, 0.12);
      --cor-acento-hover:  #f0d878;
      --transicao-rapida:  120ms ease;
      --transicao-padrao:  200ms ease;
    }

    :root,
    [data-tema="escuro"] {
      --cor-fundo:          #0f1117;
      --cor-fundo-elevado:  #161b27;
      --cor-fundo-card:     #1c2333;
      --cor-fundo-hover:    #212a3e;
      --cor-borda:          rgba(255, 255, 255, 0.07);
      --cor-borda-hover:    rgba(226, 197, 92,  0.30);
      --cor-texto-primario: #e8eaf0;
      --cor-texto-secundario:#8892a4;
      --cor-texto-terciario: #5a6478;
    }

    [data-tema="claro"] {
      --cor-fundo:          #f5f5f0;
      --cor-fundo-elevado:  #ffffff;
      --cor-fundo-card:     #ffffff;
      --cor-fundo-hover:    #f8f8f6;
      --cor-borda:          rgba(0, 0, 0, 0.08);
      --cor-borda-hover:    rgba(226, 197, 92, 0.40);
      --cor-texto-primario: #1a1a1a;
      --cor-texto-secundario:#5a5a5a;
      --cor-texto-terciario: #888888;
      --cor-acento:        #d4b450;
      --cor-acento-hover:  #e2c55c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-base);
      background: var(--cor-fundo);
      color: var(--cor-texto-primario);
      min-height: 100vh;
      padding: var(--space-lg);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
      flex-wrap: wrap;
    }

    .topbar__logo {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      text-decoration: none;
      color: var(--cor-texto-primario);
      font-weight: 600;
    }

    .topbar__voltar {
      padding: 0.5rem 1rem;
      background: var(--cor-fundo-elevado);
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-md);
      color: var(--cor-texto-secundario);
      text-decoration: none;
      transition: all var(--transicao-rapida);
    }

    .topbar__voltar:hover {
      background: var(--cor-fundo-hover);
      border-color: var(--cor-borda-hover);
    }

    .cabecalho {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
      gap: var(--space-md);
    }

    .titulo {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    #clientes-contador {
      display: inline-flex;
      background: var(--cor-acento-suave);
      color: var(--cor-acento);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2em 0.65em;
      border-radius: 999px;
      border: 1px solid rgba(226, 197, 92, 0.20);
    }

    .acoes {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transicao-rapida);
      background: var(--cor-fundo-elevado);
      color: var(--cor-texto-secundario);
      text-decoration: none;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      background: var(--cor-fundo-hover);
      border-color: var(--cor-borda-hover);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn--primary {
      background: var(--cor-acento);
      color: #000;
      border-color: var(--cor-acento);
    }

    .btn--primary:hover:not(:disabled) {
      background: var(--cor-acento-hover);
    }

    .input-busca {
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-md);
      background: var(--cor-fundo-elevado);
      color: var(--cor-texto-primario);
      font-size: 0.875rem;
      width: 280px;
      transition: border-color var(--transicao-rapida);
    }

    .input-busca:focus {
      outline: none;
      border-color: var(--cor-borda-hover);
    }

    .tabela-container {
      background: var(--cor-fundo-card);
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--cor-fundo-elevado);
      border-bottom: 1px solid var(--cor-borda);
    }

    th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--cor-texto-secundario);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    td {
      padding: 1rem;
      border-top: 1px solid var(--cor-borda);
      font-size: 0.9375rem;
    }

    tr:hover {
      background: var(--cor-fundo-hover);
    }

    .badge {
      display: inline-flex;
      padding: 0.2em 0.6em;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      background: var(--cor-acento-suave);
      color: var(--cor-acento);
    }

    .btn-tabela {
      padding: 0.3rem 0.7rem;
      font-size: 0.8125rem;
      margin-right: 0.3rem;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
    }

    .modal-overlay.ativo {
      display: flex;
    }

    .modal {
      background: var(--cor-fundo-card);
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-lg);
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: var(--space-xl);
    }

    .modal__titulo {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: var(--space-lg);
    }

    .form-grupo {
      margin-bottom: var(--space-md);
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--cor-texto-secundario);
      margin-bottom: var(--space-xs);
    }

    .form-label--obrigatorio::after {
      content: '*';
      color: #ef4444;
      margin-left: 0.2em;
    }

    .form-input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-md);
      background: var(--cor-fundo-elevado);
      color: var(--cor-texto-primario);
      font-size: 0.9375rem;
      transition: border-color var(--transicao-rapida);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--cor-borda-hover);
    }

    .form-radio-grupo {
      display: flex;
      gap: var(--space-md);
    }

    .form-radio-label {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      cursor: pointer;
      font-size: 0.9375rem;
    }

    .form-acoes {
      display: flex;
      gap: var(--space-sm);
      justify-content: flex-end;
      margin-top: var(--space-lg);
    }

    .painel-lateral {
      position: fixed;
      top: 0;
      right: -400px;
      width: 400px;
      height: 100vh;
      background: var(--cor-fundo-card);
      border-left: 1px solid var(--cor-borda);
      padding: var(--space-xl);
      overflow-y: auto;
      z-index: 999;
      transition: right 300ms ease;
    }

    .painel-lateral.ativo {
      right: 0;
    }

    .painel__fechar {
      position: absolute;
      top: var(--space-md);
      right: var(--space-md);
      background: transparent;
      border: none;
      color: var(--cor-texto-secundario);
      cursor: pointer;
      font-size: 1.5rem;
      padding: 0.5rem;
    }

    .painel__titulo {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: var(--space-sm);
    }

    .painel__info {
      color: var(--cor-texto-secundario);
      font-size: 0.875rem;
      margin-bottom: var(--space-lg);
    }

    .painel__secao {
      margin-top: var(--space-lg);
    }

    .painel__secao-titulo {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--cor-texto-terciario);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: var(--space-sm);
    }

    .painel__item {
      padding: var(--space-sm);
      background: var(--cor-fundo-elevado);
      border: 1px solid var(--cor-borda);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-xs);
    }

    .painel__item-titulo {
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .painel__item-info {
      font-size: 0.8125rem;
      color: var(--cor-texto-secundario);
    }

    .estado-vazio {
      text-align: center;
      padding: var(--space-xl);
      color: var(--cor-texto-terciario);
      font-size: 0.9375rem;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <a href="./hub.html" class="topbar__voltar">← Hub</a>
    <div class="topbar__logo">
      <span>💼</span>
      <span>DEKA OS</span>
    </div>
  </div>

  <div class="cabecalho">
    <h1 class="titulo">
      <span>💼</span>
      Clientes
      <span id="clientes-contador"></span>
    </h1>
    <div class="acoes">
      <input
        type="text"
        id="input-busca"
        class="input-busca"
        placeholder="🔍 Buscar cliente..."
      />
      <button id="btn-refresh" class="btn">↺ Atualizar</button>
      <button id="btn-novo-cliente" class="btn btn--primary">+ Novo Cliente</button>
    </div>
  </div>

  <div class="tabela-container">
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Email</th>
          <th>Tipo</th>
          <th>Origem</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="clientes-tabela">
        <tr>
          <td colspan="6" class="estado-vazio">Carregando clientes...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal de Cadastro/Edição -->
  <div id="modal-cliente" class="modal-overlay">
    <div class="modal">
      <h2 class="modal__titulo" id="modal-titulo">Novo Cliente</h2>
      <form id="form-cliente">
        <input type="hidden" id="cliente-id" />

        <div class="form-grupo">
          <label class="form-label form-label--obrigatorio">Nome</label>
          <input type="text" id="cliente-nome" class="form-input" required />
        </div>

        <div class="form-grupo">
          <label class="form-label">CPF/CNPJ</label>
          <input type="text" id="cliente-cpf-cnpj" class="form-input" />
        </div>

        <div class="form-grupo">
          <label class="form-label form-label--obrigatorio">Telefone</label>
          <input type="tel" id="cliente-telefone" class="form-input" required />
        </div>

        <div class="form-grupo">
          <label class="form-label">Email</label>
          <input type="email" id="cliente-email" class="form-input" />
        </div>

        <div class="form-grupo">
          <label class="form-label">Endereço</label>
          <input type="text" id="cliente-endereco" class="form-input" />
        </div>

        <div class="form-grupo">
          <label class="form-label">Tipo</label>
          <div class="form-radio-grupo">
            <label class="form-radio-label">
              <input type="radio" name="cliente-tipo" value="pessoa_fisica" checked />
              Pessoa Física
            </label>
            <label class="form-radio-label">
              <input type="radio" name="cliente-tipo" value="pessoa_juridica" />
              Pessoa Jurídica
            </label>
          </div>
        </div>

        <div class="form-grupo">
          <label class="form-label">Origem</label>
          <select id="cliente-origem" class="form-input">
            <option value="">Selecione...</option>
            <option value="indicacao">Indicação</option>
            <option value="instagram">Instagram</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="site">Site</option>
            <option value="outro">Outro</option>
          </select>
        </div>

        <div class="form-grupo">
          <label class="form-label">Observações</label>
          <textarea id="cliente-observacoes" class="form-input" rows="3"></textarea>
        </div>

        <div class="form-acoes">
          <button type="button" id="btn-cancelar" class="btn">Cancelar</button>
          <button type="submit" class="btn btn--primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Painel Lateral de Detalhe -->
  <div id="painel-cliente" class="painel-lateral">
    <button class="painel__fechar" id="btn-fechar-painel">×</button>
    <div id="painel-conteudo">
      <!-- Conteúdo injetado por clientes.js -->
    </div>
  </div>

  <script>
    window.DEKA_CONFIG = {
      supabaseUrl:     'https://tdylutdfzgtcfyhynenk.supabase.co',
      supabaseAnonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkeWx1dGRmemd0Y2Z5aHluZW5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODQxMjcsImV4cCI6MjA4ODg2MDEyN30.k44CAV8O8AGhq4lzy-Ms5CF6JsW2fgMqLEegKb4K-pg',
      workerUrl:       'https://anthropic-proxy.berti-b52.workers.dev',
      token:           'deka2025@berti#seguro',
    };
  </script>

  <script type="module">
    import { init } from './clientes.js';
    init();
  </script>

  <script>
    (function iniciarTema() {
      const CHAVE_TEMA = 'deka_tema_preferencia';
      const html = document.documentElement;
      const temaAtual = localStorage.getItem(CHAVE_TEMA) || 'escuro';
      html.setAttribute('data-tema', temaAtual);
    })();
  </script>

</body>
</html>
