<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEKA OS — Mestre de Obra</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    input, select, textarea { font: inherit; }

    :root {
      --verde-berti:    #1A3A2A;
      --ouro-berti:     #9A7B3A;
      --branco:         #FFFFFF;
      --cinza-claro:    #F5F5F5;
      --cinza-borda:    #E5E5E5;
      --verde-status:   #22C55E;
      --azul-andamento: #1E3A5F;
      --vermelho-alerta:#DC2626;
    }

    body {
      font-family: 'Barlow Condensed', sans-serif;
      background: var(--cinza-claro);
      color: #1A1A1A;
      min-height: 100vh;
      margin: 0;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--verde-berti);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 2px solid var(--ouro-berti);
    }

    .topbar-btn {
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      transition: all 0.15s;
    }
    .topbar-btn:hover { border-color: var(--ouro-berti); color: #fff; }

    .topbar-logo {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #fff;
    }
    .topbar-logo-sub {
      font-size: 9px;
      color: var(--ouro-berti);
      margin-left: 4px;
    }

    .topbar-sep {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.2);
      margin: 0 8px;
    }

    .topbar-titulo {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .topbar-info {
      font-size: 12px;
      color: #999;
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-info-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topbar-info-label { color: #999; }
    .topbar-info-valor { color: var(--ouro-berti); font-weight: 700; }

    /* ── TABS ── */
    .tabs {
      background: var(--branco);
      border-bottom: 1px solid var(--cinza-borda);
      display: flex;
      padding: 0 24px;
      gap: 0;
      position: sticky;
      top: 56px;
      z-index: 999;
    }

    .tab-btn {
      padding: 14px 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
      position: relative;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--verde-berti); }
    .tab-btn.ativa {
      color: var(--verde-berti);
      border-bottom-color: var(--verde-berti);
      font-weight: 800;
    }

    /* ── CONTAINER TABS ── */
    .tab-content {
      display: none;
      min-height: calc(100vh - 120px);
    }

    /* ── LOADING ── */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,58,42,0.9);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .loading-overlay.ativo { display: flex; }
    .loading-content {
      text-align: center;
      color: #fff;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: var(--ouro-berti);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-texto {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* ── ERRO ── */
    .erro-container {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--vermelho-alerta);
    }
    .erro-icone { font-size: 48px; margin-bottom: 16px; }
    .erro-msg { font-size: 16px; font-weight: 600; }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <button class="topbar-btn" onclick="window.location.href='hub.html'">← HUB</button>
    <button class="topbar-btn" onclick="window.history.back()">◄ Obras</button>
    <div class="topbar-sep"></div>
    <span class="topbar-logo">
      Mestre<span class="topbar-logo-sub">.</span>
    </span>
    <div class="topbar-sep"></div>
    <span class="topbar-titulo" id="topbar-titulo">Carregando...</span>
    <div class="topbar-info">
      <div class="topbar-info-item">
        <span class="topbar-info-label">Semana</span>
        <span class="topbar-info-valor" id="topbar-semana">—</span>
      </div>
      <div class="topbar-info-item">
        <span class="topbar-info-label">Período</span>
        <span class="topbar-info-valor" id="topbar-periodo">—</span>
      </div>
      <div class="topbar-info-item">
        <span class="topbar-info-label">Avanço</span>
        <span class="topbar-info-valor" id="topbar-pct">0%</span>
      </div>
      <div class="topbar-info-item">
        <span class="topbar-info-valor" id="topbar-hora">--:--</span>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn" data-tab="obra">Obra</button>
    <button class="tab-btn ativa" data-tab="visita">Visita</button>
    <button class="tab-btn" data-tab="orcamento">Orçamento</button>
    <button class="tab-btn" data-tab="cronograma">Cronograma</button>
    <button class="tab-btn" data-tab="equipes">Equipes</button>
    <button class="tab-btn" data-tab="pagamentos">Pagamentos</button>
    <button class="tab-btn" data-tab="registro">Registro</button>
    <button class="tab-btn" data-tab="fechamento">Fechamento</button>
    <button class="tab-btn" data-tab="assistente">Assistente</button>
  </div>

  <!-- LOADING OVERLAY -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div class="loading-texto">Carregando módulo...</div>
    </div>
  </div>

  <!-- ERRO -->
  <div class="erro-container" id="erro-container">
    <div class="erro-icone">⚠️</div>
    <div class="erro-msg" id="erro-msg">Obra não encontrada.</div>
    <button class="topbar-btn" style="margin-top:20px" onclick="window.location.href='hub.html'">← Voltar para Hub</button>
  </div>

  <!-- CONTAINERS DAS TABS -->
  <div id="tab-obra" class="tab-content"></div>
  <div id="tab-visita" class="tab-content"></div>
  <div id="tab-orcamento" class="tab-content"></div>
  <div id="tab-cronograma" class="tab-content"></div>
  <div id="tab-equipes" class="tab-content"></div>
  <div id="tab-pagamentos" class="tab-content"></div>
  <div id="tab-registro" class="tab-content"></div>
  <div id="tab-fechamento" class="tab-content"></div>
  <div id="tab-assistente" class="tab-content"></div>

</body>
</html>
