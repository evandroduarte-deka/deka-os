<!DOCTYPE html>
<html lang="pt-BR" data-tema="auto">
<!--
  DEKA OS v2.0 — hub.html
  ════════════════════════════════════════════════════════════════════════════
  Tela: Hub de Obras (tela inicial do sistema)

  IDs obrigatórios (contrato com hub.js):
    #hub-grade        → grid de cards de obras
    #hub-status-bar   → barra de resumo e timestamp
    #hub-contador     → contagem de obras no título
    #btn-refresh      → botão de atualização manual

  REGRAS DEKA OS:
    - Zero lógica de negócio neste arquivo
    - Zero DOMContentLoaded aqui (exclusivo do deka.js)
    - window.DEKA_CONFIG definido antes de qualquer import
    - CSS embutido e escoped nesta tela
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DEKA OS — Hub de Obras da Berti Construtora" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#0f1117" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f0" />

  <!-- Sem fontes externas: system-ui garante zero latência de carregamento -->
  <title>Hub de Obras · DEKA OS</title>

  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       1. DESIGN TOKENS — Variáveis de tema (claro e escuro)
       Edite aqui para mudar a paleta global sem tocar em outros seletores.
    ═══════════════════════════════════════════════════════════════════════ */

    :root {
      /* Tipografia */
      --font-base: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-mono: "SF Mono", "Fira Code", "Consolas", monospace;

      /* Tamanhos */
      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  14px;
      --radius-xl:  20px;
      --space-xs:   0.25rem;
      --space-sm:   0.5rem;
      --space-md:   1rem;
      --space-lg:   1.5rem;
      --space-xl:   2rem;
      --space-2xl:  3rem;

      /* Acento de marca — dourado Berti (constante entre temas) */
      --cor-acento:        #e2c55c;
      --cor-acento-suave:  rgba(226, 197, 92, 0.12);
      --cor-acento-hover:  #f0d878;

      /* Status semânticos (constantes entre temas) */
      --cor-ativa:          #22c55e;
      --cor-ativa-bg:       rgba(34, 197, 94,  0.12);
      --cor-pausada:        #f59e0b;
      --cor-pausada-bg:     rgba(245, 158, 11, 0.12);
      --cor-concluida:      #3b82f6;
      --cor-concluida-bg:   rgba(59, 130, 246, 0.12);
      --cor-desconhecido:   #6b7280;
      --cor-desconhecido-bg:rgba(107, 114, 128, 0.12);
      --cor-atraso:         #ef4444;
      --cor-atraso-bg:      rgba(239, 68,  68,  0.12);

      /* Progresso */
      --cor-barra-alta:  #22c55e;
      --cor-barra-media: #f59e0b;
      --cor-barra-baixa: #ef4444;

      /* Transições */
      --transicao-rapida:  120ms ease;
      --transicao-padrao:  200ms ease;
      --transicao-lenta:   350ms ease;
    }

    /* Tema escuro (padrão — escritório) */
    :root,
    [data-tema="escuro"] {
      --cor-fundo:          #0f1117;
      --cor-fundo-elevado:  #161b27;
      --cor-fundo-card:     #1c2333;
      --cor-fundo-hover:    #212a3e;
      --cor-borda:          rgba(255, 255, 255, 0.07);
      --cor-borda-hover:    rgba(226, 197, 92,  0.30);
      --cor-texto-primario: #e8eaf0;
      --cor-texto-secundario:#8892a4;
      --cor-texto-terciario: #5a6478;
      --cor-skeleton-base:  #1e2638;
      --cor-skeleton-brilho:#263045;
      --cor-sombra:         rgba(0, 0, 0, 0.40);
      --cor-sombra-card:    rgba(0, 0, 0, 0.20);
      --cor-sombra-hover:   rgba(0, 0, 0, 0.50);
    }

    /* Tema claro (obra — alta luminosidade) */
    @media (prefers-color-scheme: light) {
      :root:not([data-tema="escuro"]) {
        --cor-fundo:          #f5f5f0;
        --cor-fundo-elevado:  #ffffff;
        --cor-fundo-card:     #ffffff;
        --cor-fundo-hover:    #fafaf7;
        --cor-borda:          rgba(0, 0, 0, 0.08);
        --cor-borda-hover:    rgba(226, 197, 92,  0.50);
        --cor-texto-primario: #111827;
        --cor-texto-secundario:#4b5563;
        --cor-texto-terciario: #9ca3af;
        --cor-skeleton-base:  #e8e8e4;
        --cor-skeleton-brilho:#f0f0ec;
        --cor-sombra:         rgba(0, 0, 0, 0.08);
        --cor-sombra-card:    rgba(0, 0, 0, 0.05);
        --cor-sombra-hover:   rgba(0, 0, 0, 0.12);
      }
    }

    [data-tema="claro"] {
      --cor-fundo:          #f5f5f0;
      --cor-fundo-elevado:  #ffffff;
      --cor-fundo-card:     #ffffff;
      --cor-fundo-hover:    #fafaf7;
      --cor-borda:          rgba(0, 0, 0, 0.08);
      --cor-borda-hover:    rgba(226, 197, 92,  0.50);
      --cor-texto-primario: #111827;
      --cor-texto-secundario:#4b5563;
      --cor-texto-terciario: #9ca3af;
      --cor-skeleton-base:  #e8e8e4;
      --cor-skeleton-brilho:#f0f0ec;
      --cor-sombra:         rgba(0, 0, 0, 0.08);
      --cor-sombra-card:    rgba(0, 0, 0, 0.05);
      --cor-sombra-hover:   rgba(0, 0, 0, 0.12);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       2. RESET E BASE
    ═══════════════════════════════════════════════════════════════════════ */

    *, *::before, *::after {
      box-sizing: border-box;
      margin:     0;
      padding:    0;
    }

    html {
      font-size:           16px;
      scroll-behavior:     smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family:      var(--font-base);
      background-color: var(--cor-fundo);
      color:            var(--cor-texto-primario);
      line-height:      1.6;
      min-height:       100dvh;
      overflow-x:       hidden;
      /* Garante que o toast container do deka.js apareça corretamente */
      position:         relative;
    }

    /* Foco acessível — visível apenas via teclado */
    :focus-visible {
      outline:        2px solid var(--cor-acento);
      outline-offset: 3px;
      border-radius:  var(--radius-sm);
    }

    /* Remove outline padrão quando foco vem do mouse */
    :focus:not(:focus-visible) {
      outline: none;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       3. LAYOUT ESTRUTURAL
    ═══════════════════════════════════════════════════════════════════════ */

    .hub-wrapper {
      max-width:  1280px;
      margin:     0 auto;
      padding:    var(--space-lg) var(--space-md);
    }

    @media (min-width: 640px) {
      .hub-wrapper { padding: var(--space-xl) var(--space-lg); }
    }

    @media (min-width: 1024px) {
      .hub-wrapper { padding: var(--space-2xl) var(--space-xl); }
    }

    /* ═══════════════════════════════════════════════════════════════════════
       4. CABEÇALHO DA TELA
    ═══════════════════════════════════════════════════════════════════════ */

    .hub-cabecalho {
      display:         flex;
      align-items:     flex-start;
      justify-content: space-between;
      gap:             var(--space-md);
      margin-bottom:   var(--space-lg);
      flex-wrap:       wrap;
    }

    .hub-cabecalho__esquerda {
      display:    flex;
      flex-direction: column;
      gap:        var(--space-xs);
    }

    .hub-titulo {
      font-size:      clamp(1.5rem, 4vw, 2rem);
      font-weight:    700;
      letter-spacing: -0.03em;
      color:          var(--cor-texto-primario);
      display:        flex;
      align-items:    center;
      gap:            var(--space-sm);
      flex-wrap:      wrap;
    }

    .hub-titulo__icone {
      font-size:   1.4rem;
      line-height: 1;
    }

    /* Contador de obras — injetado pelo hub.js em #hub-contador */
    #hub-contador {
      display:       inline-flex;
      align-items:   center;
      background:    var(--cor-acento-suave);
      color:         var(--cor-acento);
      font-size:     0.75rem;
      font-weight:   600;
      padding:       0.2em 0.65em;
      border-radius: var(--radius-xl);
      border:        1px solid rgba(226, 197, 92, 0.20);
      letter-spacing:0.02em;
      vertical-align:middle;
    }

    /* Barra de status — injetada pelo hub.js em #hub-status-bar */
    #hub-status-bar {
      font-size:  0.8125rem;
      color:      var(--cor-texto-terciario);
      min-height: 1.2em;
      transition: color var(--transicao-padrao);
    }

    .status-bar__separador {
      margin:  0 var(--space-xs);
      opacity: 0.5;
    }

    .status-bar__timestamp {
      font-variant-numeric: tabular-nums;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       5. BOTÕES
    ═══════════════════════════════════════════════════════════════════════ */

    .btn {
      display:        inline-flex;
      align-items:    center;
      gap:            var(--space-xs);
      padding:        0.55rem 1.1rem;
      border:         1px solid var(--cor-borda);
      border-radius:  var(--radius-md);
      font-family:    var(--font-base);
      font-size:      0.875rem;
      font-weight:    500;
      cursor:         pointer;
      transition:     background var(--transicao-rapida),
                      border-color var(--transicao-rapida),
                      color var(--transicao-rapida),
                      opacity var(--transicao-rapida);
      white-space:    nowrap;
      user-select:    none;
      text-decoration:none;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor:  not-allowed;
    }

    /* Botão secundário (refresh) */
    #btn-refresh {
      background: var(--cor-fundo-elevado);
      color:      var(--cor-texto-secundario);
      border-color:var(--cor-borda);
    }

    #btn-refresh:hover:not(:disabled) {
      background:   var(--cor-fundo-hover);
      border-color: var(--cor-borda-hover);
      color:        var(--cor-acento);
    }

    /* Botão primário (usado em estados de erro/vazio) */
    .btn-primario {
      background:   var(--cor-acento);
      color:        #0f1117;
      border-color: var(--cor-acento);
      font-weight:  600;
    }

    .btn-primario:hover:not(:disabled) {
      background:   var(--cor-acento-hover);
      border-color: var(--cor-acento-hover);
    }

    /* Controle de tema (claro/escuro) */
    .hub-cabecalho__direita {
      display:    flex;
      align-items:center;
      gap:        var(--space-sm);
      flex-shrink:0;
    }

    .btn-tema {
      background:  var(--cor-fundo-elevado);
      color:       var(--cor-texto-secundario);
      border:      1px solid var(--cor-borda);
      border-radius:var(--radius-md);
      padding:     0.55rem 0.75rem;
      font-size:   0.875rem;
      cursor:      pointer;
      transition:  background var(--transicao-rapida),
                   color var(--transicao-rapida);
    }

    .btn-tema:hover {
      background:  var(--cor-fundo-hover);
      color:       var(--cor-acento);
      border-color:var(--cor-borda-hover);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       6. DIVISOR
    ═══════════════════════════════════════════════════════════════════════ */

    .hub-divisor {
      height:        1px;
      background:    var(--cor-borda);
      margin-bottom: var(--space-xl);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       7. GRID DE CARDS
    ═══════════════════════════════════════════════════════════════════════ */

    #hub-grid {
      display:               grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
      gap:                   var(--space-lg);
      /* Acessibilidade: anunciar loading ao leitor de tela */
      transition:            opacity var(--transicao-padrao);
    }

    #hub-grid[aria-busy="true"] {
      pointer-events: none;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       8. CARD DE OBRA
    ═══════════════════════════════════════════════════════════════════════ */

    .obra-card {
      background:    var(--cor-fundo-card);
      border:        1px solid var(--cor-borda);
      border-radius: var(--radius-lg);
      padding:       var(--space-lg);
      display:       flex;
      flex-direction:column;
      gap:           var(--space-md);
      cursor:        pointer;
      transition:    transform        var(--transicao-padrao),
                     box-shadow       var(--transicao-padrao),
                     border-color     var(--transicao-padrao),
                     background-color var(--transicao-padrao);
      position:      relative;
      overflow:      hidden;
      /* Linha de acento lateral por status — sobrescrita por modificadores */
      border-left:   3px solid transparent;
    }

    .obra-card:hover,
    .obra-card:focus-visible {
      transform:    translateY(-2px);
      box-shadow:   0 8px 24px var(--cor-sombra-hover);
      border-color: var(--cor-borda-hover);
    }

    /* Modificadores de status — colore a borda lateral */
    .obra-card--ativa    { border-left-color: var(--cor-ativa); }
    .obra-card--pausada  { border-left-color: var(--cor-pausada); }
    .obra-card--concluida{ border-left-color: var(--cor-concluida); }
    .obra-card--atrasada { border-left-color: var(--cor-atraso); }

    /* Obras concluídas ficam levemente opacas — menor destaque visual */
    .obra-card--concluida {
      opacity: 0.80;
    }
    .obra-card--concluida:hover {
      opacity: 1;
    }

    /* ─── Cabeçalho do card ────────────────────────────────────────────── */
    .obra-card__cabecalho {
      display:    flex;
      align-items:center;
      gap:        var(--space-sm);
      flex-wrap:  wrap;
    }

    /* ─── Badges de status ─────────────────────────────────────────────── */
    .obra-card__badge {
      display:       inline-flex;
      align-items:   center;
      gap:           0.3em;
      font-size:     0.6875rem;
      font-weight:   600;
      letter-spacing:0.04em;
      text-transform:uppercase;
      padding:       0.25em 0.6em;
      border-radius: var(--radius-xl);
      border:        1px solid currentColor;
      line-height:   1;
      white-space:   nowrap;
    }

    .status-ativa {
      color:            var(--cor-ativa);
      background-color: var(--cor-ativa-bg);
      border-color:     rgba(34, 197, 94, 0.25);
    }

    .status-pausada {
      color:            var(--cor-pausada);
      background-color: var(--cor-pausada-bg);
      border-color:     rgba(245, 158, 11, 0.25);
    }

    .status-concluida {
      color:            var(--cor-concluida);
      background-color: var(--cor-concluida-bg);
      border-color:     rgba(59, 130, 246, 0.25);
    }

    .status-desconhecido {
      color:            var(--cor-desconhecido);
      background-color: var(--cor-desconhecido-bg);
      border-color:     rgba(107, 114, 128, 0.25);
    }

    .obra-card__badge--atraso {
      color:            var(--cor-atraso);
      background-color: var(--cor-atraso-bg);
      border-color:     rgba(239, 68, 68, 0.25);
    }

    /* ─── Corpo: nome e cliente ────────────────────────────────────────── */
    .obra-card__corpo {
      display:       flex;
      flex-direction:column;
      gap:           var(--space-xs);
      flex:          1;
    }

    .obra-card__nome {
      font-size:      1.0625rem;
      font-weight:    600;
      line-height:    1.3;
      letter-spacing: -0.01em;
      color:          var(--cor-texto-primario);
      /* Trunca nomes muito longos com reticências */
      display:        -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow:       hidden;
    }

    .obra-card__cliente {
      display:    flex;
      align-items:center;
      gap:        var(--space-sm);
      font-size:  0.8125rem;
      color:      var(--cor-texto-secundario);
    }

    .obra-card__rotulo {
      font-size:     0.6875rem;
      font-weight:   600;
      letter-spacing:0.04em;
      text-transform:uppercase;
      color:         var(--cor-texto-terciario);
      white-space:   nowrap;
      flex-shrink:   0;
    }

    /* ─── Progresso ────────────────────────────────────────────────────── */
    .obra-card__progresso {
      display:       flex;
      flex-direction:column;
      gap:           var(--space-xs);
    }

    .obra-card__progresso-rotulo {
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      font-size:       0.75rem;
      color:           var(--cor-texto-terciario);
    }

    .obra-card__progresso-valor {
      font-weight:          700;
      font-variant-numeric: tabular-nums;
      font-size:            0.8125rem;
      color:                var(--cor-texto-secundario);
    }

    .obra-card__barra-trilha {
      width:         100%;
      height:        6px;
      background:    var(--cor-borda);
      border-radius: var(--radius-xl);
      overflow:      hidden;
    }

    .obra-card__barra-preenchimento {
      height:        100%;
      border-radius: var(--radius-xl);
      transition:    width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      /* Animação de entrada na largura — efeito elástico sutil */
    }

    .barra--alta  { background: var(--cor-barra-alta); }
    .barra--media { background: var(--cor-barra-media); }
    .barra--baixa { background: var(--cor-barra-baixa); }

    /* ─── Rodapé: data de previsão ─────────────────────────────────────── */
    .obra-card__rodape {
      display:     flex;
      align-items: center;
      gap:         var(--space-sm);
      font-size:   0.8125rem;
      color:       var(--cor-texto-secundario);
      /* Linha divisória sutil acima do rodapé */
      border-top:  1px solid var(--cor-borda);
      padding-top: var(--space-sm);
      flex-wrap:   wrap;
    }

    .obra-card__data--atrasada {
      color:      var(--cor-atraso);
      font-weight:600;
    }

    /* ─── Ícone de navegação (→) ───────────────────────────────────────── */
    .obra-card__nav {
      position:   absolute;
      top:        var(--space-lg);
      right:      var(--space-lg);
      font-size:  1rem;
      color:      var(--cor-texto-terciario);
      transition: transform      var(--transicao-padrao),
                  color          var(--transicao-padrao);
    }

    .obra-card:hover  .obra-card__nav,
    .obra-card:focus-visible .obra-card__nav {
      transform: translateX(3px);
      color:     var(--cor-acento);
    }

    /* ═══════════════════════════════════════════════════════════════════════
       9. SKELETON (LOADING)
       Shimmer: pseudo-elemento com gradiente animado desliza da esq. p/ dir.
    ═══════════════════════════════════════════════════════════════════════ */

    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }

    .obra-card--skeleton {
      cursor:        default;
      pointer-events:none;
      border-left-color: var(--cor-borda);
    }

    .obra-card--skeleton:hover {
      transform:    none;
      box-shadow:   none;
      border-color: var(--cor-borda);
    }

    .skeleton-linha {
      border-radius: var(--radius-sm);
      background:    linear-gradient(
        90deg,
        var(--cor-skeleton-base)   0%,
        var(--cor-skeleton-brilho) 50%,
        var(--cor-skeleton-base)   100%
      );
      background-size: 400px 100%;
      animation:       shimmer 1.6s ease-in-out infinite;
    }

    /* Desativa animação se o usuário preferir menos movimento */
    @media (prefers-reduced-motion: reduce) {
      .skeleton-linha { animation: none; }
    }

    /* Altura e largura de cada linha do skeleton */
    .skeleton-titulo  { height: 1.25rem; width: 75%; margin-bottom: var(--space-xs); }
    .skeleton-cliente { height: 0.875rem; width: 50%; }
    .skeleton-barra   { height: 6px; width: 100%; margin-top: var(--space-sm); }
    .skeleton-rodape  { height: 0.75rem; width: 60%; margin-top: var(--space-xs); }

    /* ═══════════════════════════════════════════════════════════════════════
       10. ESTADOS VAZIOS E DE ERRO
    ═══════════════════════════════════════════════════════════════════════ */

    .hub-estado-vazio {
      grid-column:    1 / -1;
      display:        flex;
      flex-direction: column;
      align-items:    center;
      justify-content:center;
      gap:            var(--space-md);
      padding:        var(--space-2xl) var(--space-lg);
      text-align:     center;
      min-height:     280px;
    }

    .hub-estado-icone {
      font-size:   3rem;
      line-height: 1;
      opacity:     0.7;
    }

    .hub-estado-titulo {
      font-size:      1.125rem;
      font-weight:    600;
      color:          var(--cor-texto-primario);
      letter-spacing: -0.01em;
    }

    .hub-estado-descricao {
      font-size:  0.875rem;
      color:      var(--cor-texto-secundario);
      max-width:  380px;
      line-height:1.6;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       11. RODAPÉ DA TELA
    ═══════════════════════════════════════════════════════════════════════ */

    .hub-rodape {
      margin-top:     var(--space-2xl);
      padding-top:    var(--space-lg);
      border-top:     1px solid var(--cor-borda);
      display:        flex;
      align-items:    center;
      justify-content:space-between;
      flex-wrap:      wrap;
      gap:            var(--space-sm);
    }

    .hub-rodape__marca {
      display:    flex;
      align-items:center;
      gap:        var(--space-sm);
      font-size:  0.75rem;
      color:      var(--cor-texto-terciario);
      font-weight:500;
      letter-spacing:0.02em;
    }

    .hub-rodape__versao {
      font-family:var(--font-mono);
      font-size:  0.6875rem;
      color:      var(--cor-texto-terciario);
      opacity:    0.6;
    }

    /* ═══════════════════════════════════════════════════════════════════════
       12. BARRA DE TOPO (NAVEGAÇÃO FUTURA)
       Reserva visual para quando módulos de navegação forem adicionados.
    ═══════════════════════════════════════════════════════════════════════ */

    .hub-topbar {
      position:       sticky;
      top:            0;
      z-index:        100;
      background:     var(--cor-fundo);
      border-bottom:  1px solid var(--cor-borda);
      padding:        var(--space-sm) var(--space-md);
      display:        flex;
      align-items:    center;
      gap:            var(--space-sm);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    @media (min-width: 640px) {
      .hub-topbar { padding: var(--space-sm) var(--space-lg); }
    }

    .hub-topbar__logo {
      display:        flex;
      align-items:    center;
      gap:            var(--space-sm);
      text-decoration:none;
      color:          var(--cor-texto-primario);
    }

    .hub-topbar__logo-icone {
      width:          28px;
      height:         28px;
      background:     var(--cor-acento);
      border-radius:  var(--radius-sm);
      display:        flex;
      align-items:    center;
      justify-content:center;
      font-size:      0.875rem;
      color:          #0f1117;
      font-weight:    800;
      flex-shrink:    0;
    }

    .hub-topbar__nome {
      font-size:    0.875rem;
      font-weight:  700;
      letter-spacing:-0.01em;
      display:      none;
    }

    @media (min-width: 480px) {
      .hub-topbar__nome { display: block; }
    }

    .hub-topbar__separador {
      height:     16px;
      width:      1px;
      background: var(--cor-borda);
      display:    none;
    }

    @media (min-width: 480px) {
      .hub-topbar__separador { display: block; }
    }

    .hub-topbar__pagina {
      font-size:  0.8125rem;
      color:      var(--cor-texto-terciario);
      display:    none;
    }

    @media (min-width: 480px) {
      .hub-topbar__pagina { display: block; }
    }

    .hub-topbar__espaco { flex: 1; }

    /* ═══════════════════════════════════════════════════════════════════════
       13. UTILITÁRIOS
    ═══════════════════════════════════════════════════════════════════════ */

    /* Acessibilidade: oculta visualmente mas mantém para leitores de tela */
    .sr-only {
      position: absolute;
      width:    1px;
      height:   1px;
      padding:  0;
      margin:   -1px;
      overflow: hidden;
      clip:     rect(0,0,0,0);
      white-space: nowrap;
      border:   0;
    }
  </style>
</head>

<body>

  <!-- ══════════════════════════════════════════════════════════════════════
       BARRA DE TOPO FIXA
       Navegação global — slots para módulos futuros (Brain, Cockpit, etc.)
  ══════════════════════════════════════════════════════════════════════ -->
  <header class="hub-topbar" role="banner">
    <a href="index.html" class="hub-topbar__logo" aria-label="DEKA OS — ir para início">
      <div class="hub-topbar__logo-icone" aria-hidden="true">D</div>
      <span class="hub-topbar__nome">DEKA OS</span>
    </a>

    <div class="hub-topbar__separador" aria-hidden="true"></div>
    <span class="hub-topbar__pagina" aria-current="page">Hub de Obras</span>
    <div class="hub-topbar__espaco"></div>

    <!-- Controle de tema: sem JS inline — atributo data-tema no <html> -->
    <button
      class="btn-tema"
      id="btn-tema"
      aria-label="Alternar tema claro/escuro"
      title="Alternar tema"
    >☀️</button>
  </header>

  <!-- ══════════════════════════════════════════════════════════════════════
       CONTEÚDO PRINCIPAL
  ══════════════════════════════════════════════════════════════════════ -->
  <main class="hub-wrapper" id="conteudo-principal">

    <!-- Cabeçalho da seção -->
    <div class="hub-cabecalho" role="heading" aria-level="1">

      <div class="hub-cabecalho__esquerda">
        <!-- Título composto: texto estático + contador dinâmico do hub.js -->
        <h1 class="hub-titulo">
          <span class="hub-titulo__icone" aria-hidden="true">🏗️</span>
          Obras
          <!-- hub.js injeta o número de obras aqui -->
          <span
            id="hub-contador"
            aria-label="Total de obras"
            aria-live="polite"
          ></span>
        </h1>

        <!-- hub.js injeta resumo + timestamp aqui -->
        <div
          id="hub-status-bar"
          role="status"
          aria-live="polite"
          aria-label="Status do carregamento de obras"
        ></div>
      </div>

      <div class="hub-cabecalho__direita">
        <!-- hub.js desabilita este botão durante o carregamento -->
        <button
          id="btn-refresh"
          class="btn"
          type="button"
          aria-label="Atualizar lista de obras"
          title="Buscar dados atualizados do banco de dados"
        >
          ↺ Atualizar
        </button>
      </div>

    </div><!-- /.hub-cabecalho -->

    <!-- Divisor visual -->
    <hr class="hub-divisor" aria-hidden="true" />

    <!-- Grid de obras — hub.js popula este elemento -->
    <!-- Estados possíveis: skeleton (loading), cards (sucesso), vazio, erro -->
    <section
      id="hub-grid"
      aria-label="Lista de obras"
      aria-live="polite"
      aria-busy="true"
    >
      <!--
        Conteúdo inicial vazio intencional.
        hub.js renderiza os cards (ou estados de erro/vazio)
        após carregar os dados do Supabase.
        aria-busy="true" avisa leitores de tela que o conteúdo está carregando.
      -->
    </section>

  </main><!-- /.hub-wrapper -->

  <!-- ══════════════════════════════════════════════════════════════════════
       RODAPÉ
  ══════════════════════════════════════════════════════════════════════ -->
  <footer class="hub-wrapper">
    <div class="hub-rodape" role="contentinfo">
      <div class="hub-rodape__marca">
        <span aria-hidden="true">⚡</span>
        <span>DEKA OS · Berti Construtora</span>
      </div>
      <span class="hub-rodape__versao">v2.0.0</span>
    </div>
  </footer>

  <!-- ══════════════════════════════════════════════════════════════════════
       CONFIGURAÇÃO (definida ANTES de qualquer import)

       PRODUÇÃO: Substitua os placeholders pelos valores reais.
       SEGURANÇA: supabaseAnonKey é a chave pública (anon) — exposta é seguro.
                  O acesso aos dados é controlado pelo RLS do Supabase.
                  token e keys privadas ficam APENAS no Cloudflare Worker.
  ══════════════════════════════════════════════════════════════════════ -->
  <script>
    window.DEKA_CONFIG = {
      supabaseUrl:     'https://tdylutdfzgtcfyhynenk.supabase.co',
      supabaseAnonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkeWx1dGRmemd0Y2Z5aHluZW5rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODQxMjcsImV4cCI6MjA4ODg2MDEyN30.k44CAV8O8AGhq4lzy-Ms5CF6JsW2fgMqLEegKb4K-pg',
      workerUrl:       'https://anthropic-proxy.berti-b52.workers.dev',
      token:           'deka2025@berti#seguro',
    };
  </script>

  <!-- ══════════════════════════════════════════════════════════════════════
       MOTOR DO SISTEMA
       deka.js inicializa o Supabase, o sistema de toast e os monitores.
       hub.js contém TODA a lógica desta tela.
       Nenhuma linha de lógica de negócio deve existir acima deste bloco.
  ══════════════════════════════════════════════════════════════════════ -->
  <script type="module">
    import { init } from './hub.js';

    // Único ponto de ativação desta tela.
    // DOMContentLoaded é gerenciado exclusivamente pelo deka.js.
    // Chamamos init() diretamente pois o script está ao final do <body>
    // e o DOM já está pronto no momento da execução.
    init();
  </script>

  <!-- ══════════════════════════════════════════════════════════════════════
       CONTROLE DE TEMA (claro/escuro)
       Lógica mínima e isolada — não interfere com hub.js ou deka.js.
       Persiste a preferência do gestor em localStorage com chave dedicada.
  ══════════════════════════════════════════════════════════════════════ -->
  <script>
    (function iniciarTema() {
      const CHAVE_TEMA  = 'deka_tema_preferencia'; // fora do namespace deka_cache_v2
      const html        = document.documentElement;
      const btnTema     = document.getElementById('btn-tema');

      // Aplica o tema salvo (antes de qualquer render — sem flash)
      const temaSalvo   = localStorage.getItem(CHAVE_TEMA);
      if (temaSalvo === 'claro' || temaSalvo === 'escuro') {
        html.setAttribute('data-tema', temaSalvo);
      }

      // Atualiza ícone do botão conforme o tema ativo
      function atualizarIconeTema() {
        const temaAtual = html.getAttribute('data-tema');
        if (btnTema) {
          btnTema.textContent = temaAtual === 'claro' ? '🌙' : '☀️';
          btnTema.setAttribute('aria-label',
            temaAtual === 'claro' ? 'Ativar tema escuro' : 'Ativar tema claro'
          );
        }
      }

      // Alterna entre claro e escuro ao clicar
      if (btnTema) {
        btnTema.addEventListener('click', function () {
          const atual  = html.getAttribute('data-tema');
          const novo   = (atual === 'claro') ? 'escuro' : 'claro';
          html.setAttribute('data-tema', novo);
          localStorage.setItem(CHAVE_TEMA, novo);
          atualizarIconeTema();
        });
      }

      atualizarIconeTema();
    })();
  </script>

</body>
</html>
