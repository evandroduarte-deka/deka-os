<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEKA OS — Obras</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    a { color: inherit; text-decoration: none; }

    /* Tokens */
    :root {
      --bg:        #0d0d0d;
      --surface:   #1a1a1a;
      --surface2:  #242424;
      --border:    #2e2e2e;
      --ouro:      #C8A84B;
      --ouro-dim:  #8a7233;
      --texto:     #f0f0f0;
      --texto-2:   #999;
      --verde:     #22C55E;
      --amarelo:   #F59E0B;
      --vermelho:  #DC2626;
      --azul:      #1E3A5F;
    }

    body {
      font-family: 'Barlow Condensed', sans-serif;
      background: var(--bg);
      color: var(--texto);
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo { display: flex; align-items: baseline; gap: 8px; }
    .topbar-logo-nome { font-size: 20px; font-weight: 800; letter-spacing: 3px; color: #fff; }
    .topbar-logo-sub  { font-size: 9px; letter-spacing: 3px; color: var(--ouro); text-transform: uppercase; }
    .topbar-nav { display: flex; gap: 4px; }
    .topbar-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--texto-2);
      transition: background 0.15s, color 0.15s;
    }
    .topbar-btn:hover, .topbar-btn.ativo { background: var(--surface2); color: var(--texto); }
    .topbar-btn.ativo { color: var(--ouro); }
    .topbar-acoes { display: flex; gap: 8px; align-items: center; }
    .btn-primary {
      padding: 7px 16px;
      background: var(--ouro);
      color: #1a1a1a;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #b8953e; }
    .btn-ghost {
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--texto-2);
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--ouro-dim); color: var(--texto); }

    /* ── HERO ── */
    .hero {
      padding: 32px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .hero-titulo { font-size: 28px; font-weight: 800; letter-spacing: 1px; color: #fff; }
    .hero-sub { font-size: 13px; color: var(--texto-2); margin-top: 4px; }
    .hero-filtros {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .filtro-btn {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--texto-2);
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filtro-btn:hover   { border-color: var(--ouro-dim); color: var(--texto); }
    .filtro-btn.ativo   { background: var(--ouro); border-color: var(--ouro); color: #1a1a1a; }

    /* ── GRID ── */
    .grid-container { padding: 24px; }
    .obras-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* ── CARD ── */
    .obra-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }
    .obra-card:hover {
      border-color: var(--ouro-dim);
      transform: translateY(-2px);
    }
    .obra-card-capa {
      height: 120px;
      background: var(--surface2);
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .obra-card-capa-placeholder {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      opacity: 0.3;
    }
    .obra-card-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .badge-ativa     { background: rgba(34,197,94,0.2);  color: #22C55E; border: 1px solid rgba(34,197,94,0.4); }
    .badge-pausada   { background: rgba(245,158,11,0.2); color: #F59E0B; border: 1px solid rgba(245,158,11,0.4); }
    .badge-concluida { background: rgba(99,102,241,0.2); color: #818CF8; border: 1px solid rgba(99,102,241,0.4); }
    .badge-atrasada  { background: rgba(220,38,38,0.2);  color: #DC2626; border: 1px solid rgba(220,38,38,0.4); }

    .obra-card-body { padding: 14px 16px; }
    .obra-card-nome {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .obra-card-cliente { font-size: 12px; color: var(--texto-2); margin-bottom: 12px; }
    .obra-card-tipo    { font-size: 11px; color: var(--ouro-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

    .progresso-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--texto-2);
      margin-bottom: 5px;
    }
    .progresso-valor { color: var(--ouro); font-weight: 700; }
    .progresso-barra {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progresso-fill {
      height: 100%;
      background: var(--ouro);
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .obra-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--texto-2);
    }
    .obra-card-semana { color: var(--ouro); font-weight: 600; }

    /* ── SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .skeleton-card {
      height: 220px;
      border-radius: 12px;
    }

    /* ── VAZIO ── */
    .estado-vazio {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--texto-2);
    }
    .estado-vazio-icone { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
    .estado-vazio-titulo { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .estado-vazio-sub { font-size: 13px; }

    /* ── MODAL TOKEN ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.oculto { display: none; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
    }
    .modal-titulo { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--texto-2); margin-bottom: 20px; }
    .form-grupo { margin-bottom: 16px; }
    .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--texto-2); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--texto);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--ouro-dim); }
    .modal-acoes { display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-logo">
      <span class="topbar-logo-nome">DEKA.</span>
      <span class="topbar-logo-sub">OS</span>
    </div>
    <nav class="topbar-nav">
      <button class="topbar-btn ativo">🏗️ Obras</button>
      <button class="topbar-btn" onclick="window.location.href='brain.html'">🧠 Brain</button>
      <button class="topbar-btn" onclick="window.location.href='comercial.html'">💼 Comercial</button>
      <button class="topbar-btn" onclick="window.location.href='relatorios.html'">📄 Relatórios</button>
