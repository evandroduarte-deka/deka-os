<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=hub.html">
  <title>DEKA OS — Berti Construtora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Barlow Condensed', sans-serif;
      background: #1A3A2A;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .logo {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #fff;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .logo-sub {
      font-size: 14px;
      letter-spacing: 3px;
      color: #9A7B3A;
      text-transform: uppercase;
      margin-top: -16px;
    }
    .loading-text {
      font-size: 16px;
      color: #9A7B3A;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #9A7B3A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="logo">DEKA OS</div>
    <div class="logo-sub">Berti Construtora</div>
    <div class="spinner"></div>
    <div class="loading-text">Carregando sistema...</div>
  </div>

  <script>
    // Redirecionar para hub.html após 0.5s (suaviza a transição)
    setTimeout(() => {
      window.location.href = 'hub.html';
    }, 500);
  </script>
</body>
</html>
